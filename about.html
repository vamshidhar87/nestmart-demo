<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About & Contact — Padmavathi Traders</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* ── About page specific styles ── */

    /* Hero */
    .about-hero {
      position: relative;
      background: linear-gradient(140deg, #163d2c 0%, #1f6b4d 55%, #2a8560 100%);
      color: #fff;
      padding: 64px 0 56px;
      overflow: hidden;
    }
    .about-hero-canvas {
      position: absolute;
      inset: 0;
      opacity: .08;
      pointer-events: none;
    }
    .about-hero-inner {
      position: relative;
      z-index: 1;
    }
    .about-hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .8px;
      text-transform: uppercase;
      padding: 5px 14px;
      margin-bottom: 20px;
      color: #b3f0d0;
    }
    .about-hero h1 {
      font-family: var(--font-heading);
      font-size: clamp(30px, 4vw, 44px);
      font-weight: 700;
      color: #fff;
      line-height: 1.18;
      text-wrap: balance;
      margin-bottom: 14px;
      max-width: 560px;
    }
    .about-hero-sub {
      font-size: 17px;
      color: rgba(255,255,255,.78);
      line-height: 1.6;
      max-width: 440px;
    }
    .about-hero-stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 40px;
      padding-top: 32px;
      border-top: 1px solid rgba(255,255,255,.15);
      flex-wrap: wrap;
      gap: 24px 0;
    }
    .about-hero-stats > div {
      flex: 1;
      min-width: 100px;
      text-align: center;
      position: relative;
    }
    .about-hero-stats > div + div::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 1px;
      height: 36px;
      background: rgba(255,255,255,.2);
    }
    .hero-stat-value {
      font-family: var(--font-heading);
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
      margin-bottom: 5px;
      font-variant-numeric: tabular-nums;
    }
    .hero-stat-label {
      font-size: 11px;
      color: rgba(255,255,255,.6);
      text-transform: uppercase;
      letter-spacing: .6px;
      font-weight: 600;
    }

    /* Story section */
    .story-section {
      padding: 80px 0 72px;
      background: #fff;
    }
    .story-grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 64px;
      align-items: center;
    }
    .story-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--green-mid);
      margin-bottom: 16px;
    }
    .story-heading {
      font-family: var(--font-heading);
      font-size: clamp(24px, 3vw, 34px);
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.25;
      text-wrap: balance;
      margin-bottom: 24px;
    }
    .story-body {
      font-size: 16px;
      line-height: 1.75;
      color: #334155;
      max-width: 56ch;
    }
    /* Horizontal Timeline */
    .h-timeline-wrap {
      margin-top: 48px;
      overflow-x: auto;
      padding-bottom: 8px;
    }
    .h-timeline {
      display: flex;
      align-items: flex-start;
      min-width: 640px;
      position: relative;
    }
    .h-tl-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }
    /* horizontal connector line through the dot row */
    .h-tl-item::after {
      content: '';
      position: absolute;
      top: calc(100px + 36px + 16px + 16px);
      left: 0;
      right: 0;
      height: 2px;
      background: #d4ede0;
      z-index: 0;
    }
    .h-tl-item:first-child::after { left: 50%; }
    .h-tl-item:last-child::after  { right: 50%; }

    /* ── top block: icon + title ── */
    .h-tl-top {
      height: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 0 8px;
      text-align: center;
    }
    .h-tl-icon {
      font-size: 30px;
      margin-bottom: 8px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,.10));
    }
    .h-tl-title {
      font-family: var(--font-heading);
      font-size: 13px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.25;
    }

    /* ── year chevron badge ── */
    .h-tl-badge {
      margin-top: 12px;
      color: #fff;
      font-family: var(--font-heading);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .2px;
      padding: 7px 14px 14px;
      border-radius: 4px 4px 0 0;
      position: relative;
      min-width: 72px;
      text-align: center;
      clip-path: polygon(0 0, 100% 0, 100% 70%, 50% 100%, 0 70%);
      line-height: 1;
    }

    /* ── numbered dot ── */
    .h-tl-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 4px;
      position: relative;
      z-index: 1;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }

    /* ── description text ── */
    .h-tl-desc {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.55;
      margin-top: 12px;
      padding: 0 10px;
      max-width: 160px;
    }
    .story-year-block {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      user-select: none;
    }
    .year-bg-number {
      font-family: var(--font-heading);
      font-size: clamp(100px, 14vw, 160px);
      font-weight: 700;
      color: #eafff4;
      line-height: 1;
      letter-spacing: -4px;
      position: relative;
      z-index: 1;
    }
    .year-badge {
      position: absolute;
      bottom: 12px;
      right: -8px;
      background: var(--green-dark);
      color: #fff;
      border-radius: 10px;
      padding: 10px 18px;
      font-family: var(--font-heading);
      font-size: 13px;
      font-weight: 700;
      box-shadow: var(--shadow-md);
      z-index: 2;
    }
    .year-badge span {
      display: block;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }

    /* Team section */
    .team-section {
      padding: 72px 0;
      background: var(--bg-outer);
    }
    .team-section-header {
      margin-bottom: 40px;
    }
    .section-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--green-mid);
      margin-bottom: 10px;
    }
    .section-big-heading {
      font-family: var(--font-heading);
      font-size: clamp(22px, 3vw, 30px);
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.25;
      text-wrap: balance;
    }
    /* Team — generation-based layout */
    .team-generations { margin-top: 40px; }
    .team-gen-divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }
    .team-gen-divider.gen-spacing { margin-top: 40px; }
    .team-gen-divider::before,
    .team-gen-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-light);
    }
    .team-gen-badge {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--green-dark);
      background: var(--green-light);
      padding: 5px 14px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .gen-cards-row {
      display: grid;
      gap: 20px;
    }
    .gen-cards-row.g1 {
      grid-template-columns: 1fr;
      max-width: 520px;
      margin: 0 auto;
      width: 100%;
    }
    .gen-cards-row.g2 { grid-template-columns: repeat(2, 1fr); }
    .team-card {
      background: #fff;
      border-radius: var(--radius-card);
      border: 1px solid var(--border-light);
      padding: 26px 22px;
      box-shadow: var(--shadow-sm);
      transition: box-shadow .2s, transform .2s;
    }
    .team-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    .team-card.featured {
      display: flex;
      align-items: flex-start;
      gap: 22px;
      background: linear-gradient(135deg, #edf8f2 0%, #fff 65%);
      border-color: #b5dcc7;
    }
    .team-card.featured .team-avatar {
      flex-shrink: 0;
      margin-bottom: 0;
      width: 66px;
      height: 66px;
      font-size: 22px;
    }
    .team-card.featured .team-name { font-size: 19px; }
    .team-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-heading);
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: -.5px;
    }
    .team-name {
      font-family: var(--font-heading);
      font-size: 17px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 4px;
    }
    .team-role {
      font-size: 12px;
      font-weight: 600;
      color: var(--green-mid);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 12px;
    }
    .team-bio {
      font-size: 13.5px;
      color: var(--text-muted);
      line-height: 1.6;
    }
    .team-gen-tag { display: none; }

    /* Clients section */
    .clients-section {
      padding: 72px 0;
      background: #fff;
    }
    .clients-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 36px;
    }
    .client-tile {
      background: #fff;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-card);
      padding: 20px 20px 18px;
      transition: border-color .18s, box-shadow .18s;
    }
    .client-tile:hover {
      border-color: var(--green-mid);
      box-shadow: 0 4px 16px rgba(31,107,77,.08);
    }
    .client-tile-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .client-tile-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .client-count-value {
      font-family: var(--font-heading);
      font-size: 26px;
      font-weight: 800;
      color: var(--green-dark);
      line-height: 1;
      text-align: right;
    }
    .client-count-label {
      font-size: 10.5px;
      color: var(--text-muted);
      text-align: right;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-top: 3px;
    }
    .client-tile-icon-wrap {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      background: var(--green-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .client-tile-name {
      font-family: var(--font-heading);
      font-size: 15px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
    }
    .client-tenure {
      display: inline-block;
      font-size: 10.5px;
      font-weight: 700;
      color: var(--green-dark);
      background: var(--green-light);
      border: 1px solid #b3e6cc;
      border-radius: 99px;
      padding: 2px 8px;
      margin-top: 3px;
    }
    .client-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.55;
      margin-bottom: 12px;
    }
    .client-examples {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .client-chip {
      font-size: 11.5px;
      font-weight: 600;
      color: #334155;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 3px 9px;
      white-space: nowrap;
    }
    .clients-trust-bar {
      margin-top: 36px;
      background: var(--green-light);
      border-radius: var(--radius-card);
      padding: 20px 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .trust-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .trust-item-value {
      font-family: var(--font-heading);
      font-size: 22px;
      font-weight: 700;
      color: var(--green-dark);
      font-variant-numeric: tabular-nums;
    }
    .trust-item-label {
      font-size: 13px;
      color: var(--green-dark);
      font-weight: 500;
      opacity: .8;
    }
    .trust-sep {
      width: 1px;
      height: 28px;
      background: #b3e6cc;
    }

    /* Contact section */
    .contact-section {
      padding: 80px 0 88px;
      background: var(--bg-outer);
    }
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 40px;
      margin-top: 40px;
    }
    .contact-form-card {
      background: #fff;
      border-radius: var(--radius-card);
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-sm);
      padding: 32px;
    }
    .contact-form-title {
      font-family: var(--font-heading);
      font-size: 20px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 6px;
    }
    .contact-form-sub {
      font-size: 13.5px;
      color: var(--text-muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .contact-submit-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--green-dark);
      color: #fff;
      border: none;
      border-radius: var(--radius-btn);
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 600;
      padding: 13px 28px;
      cursor: pointer;
      transition: background .18s;
      width: 100%;
      justify-content: center;
      margin-top: 8px;
    }
    .contact-submit-btn:hover {
      background: #163d2c;
    }
    .contact-submit-btn:focus-visible {
      outline: 3px solid var(--green-mid);
      outline-offset: 2px;
    }
    .contact-details-card {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .store-info-card {
      background: #fff;
      border-radius: var(--radius-card);
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .store-info-header {
      background: linear-gradient(135deg, #163d2c, #1f6b4d);
      color: #fff;
      padding: 20px 24px;
    }
    .store-info-header-name {
      font-family: var(--font-heading);
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 3px;
    }
    .store-info-header-sub {
      font-size: 12px;
      opacity: .7;
    }
    .store-info-body {
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .store-info-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .store-info-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: var(--green-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .store-info-text {
      flex: 1;
    }
    .store-info-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-muted);
      margin-bottom: 2px;
    }
    .store-info-value {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text-dark);
      line-height: 1.5;
    }
    .store-info-value a {
      color: var(--green-dark);
      font-weight: 600;
    }
    .store-info-value a:hover {
      text-decoration: underline;
    }
    .map-placeholder {
      background: #e8f0e8;
      border-radius: 11px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1f6b4d;
      font-weight: 600;
      font-size: 15px;
      gap: 8px;
      border: 1px solid var(--border-light);
    }
    .whatsapp-cta {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #25d366;
      color: #fff;
      border-radius: var(--radius-btn);
      padding: 13px 20px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: background .18s;
      justify-content: center;
      margin-top: 14px;
    }
    .whatsapp-cta:hover { background: #1aaf51; }
    .whatsapp-cta:focus-visible { outline: 3px solid #25d366; outline-offset: 2px; }

    /* Responsive */
    @media (max-width: 900px) {
      .story-grid { grid-template-columns: 1fr; }
      .story-year-block { display: none; }
      .gen-cards-row.g2 { grid-template-columns: 1fr; }
      .gen-cards-row.g1 { max-width: 100%; }

      .clients-grid { grid-template-columns: 1fr; }
      .about-hero-stats { justify-content: flex-start; gap: 20px; }
      .about-hero-stats > div { flex: 0 0 auto; min-width: auto; text-align: left; }
      .about-hero-stats > div + div::before { display: none; }

      .contact-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      .gen-cards-row.g2 { grid-template-columns: 1fr; }
      .clients-grid { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .about-hero { padding: 36px 0 28px; }
      .about-hero h1 { font-size: 26px; }
      .about-hero-sub { font-size: 14px; }

      /* Stats: clean 2-column grid */
      .about-hero-stats {
        display: grid !important;
        grid-template-columns: 1fr 1fr;
        gap: 18px 12px;
        margin-top: 22px;
        padding-top: 18px;
        justify-content: unset;
      }
      .about-hero-stats > div { flex: none; text-align: left; }
      .about-hero-stats > div:last-child { grid-column: 1 / -1; }
      .hero-stat-value { font-size: 22px; }

      /* Reduce section vertical padding */
      .story-section  { padding: 36px 0 28px; }
      .team-section   { padding: 36px 0; }
      .clients-section { padding: 36px 0; }
      .contact-section { padding: 36px 0 44px; }

      /* Trust bar: 2-column grid, hide flex separators */
      .clients-trust-bar {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        padding: 18px 16px;
      }
      .trust-sep { display: none; }
      .trust-item-value { font-size: 18px; }
      .trust-item-label { font-size: 12px; }

      /* Contact form in about page */
      .contact-form-card { padding: 20px; }
      .form-row { grid-template-columns: 1fr; }

      /* Team card featured layout: stack on mobile */
      .team-card.featured { flex-direction: column; gap: 14px; }
    }
  </style>
</head>
<body>
<div id="app"></div>
<script src="/js/data.js"></script>
<script src="/js/state.js"></script>
<script src="/js/components.js"></script>
<script>
  injectStorefrontShell();

  const main = document.getElementById('main-content');
  main.innerHTML = `
    <!-- ── Hero ── -->
    <section class="about-hero">
      <canvas class="about-hero-canvas" id="hero-canvas"></canvas>
      <div class="container about-hero-inner">
        <div class="about-hero-eyebrow">Serving Hyderabad since 1968 &middot; 57th year</div>
        <h1>Four floors of stationery &amp; fine art, run by one family.</h1>
        <p class="about-hero-sub">From a single counter in Narayanguda to one of Hyderabad's most trusted stationery &amp; art-supply houses — serving artists, students, schools, colleges and offices for over five decades.</p>
        <div class="about-hero-stats">
          <div>
            <div class="hero-stat-value">1968</div>
            <div class="hero-stat-label">Established</div>
          </div>
          <div>
            <div class="hero-stat-value">4</div>
            <div class="hero-stat-label">Floors of supplies</div>
          </div>
          <div>
            <div class="hero-stat-value">2,000+</div>
            <div class="hero-stat-label">Brands in stock</div>
          </div>
          <div>
            <div class="hero-stat-value">15,000+</div>
            <div class="hero-stat-label">Products</div>
          </div>
          <div>
            <div class="hero-stat-value">1,200+</div>
            <div class="hero-stat-label">Clients served</div>
          </div>
          <div>
            <div class="hero-stat-value">4.5★</div>
            <div class="hero-stat-label">Customer rating</div>
          </div>
          <div>
            <div class="hero-stat-value">1,286+</div>
            <div class="hero-stat-label">Reviews &amp; counting</div>
          </div>
        </div>
      </div>
    </section>

  // ── Hero canvas texture ──
  (function() {
    const canvas = document.getElementById('hero-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    function draw() {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1;
      const spacing = 28;
      for (let x = -canvas.height; x < canvas.width + canvas.height; x += spacing) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x + canvas.height, canvas.height);
        ctx.stroke();
      }
    }
    draw();
    window.addEventListener('resize', draw);
  })();
