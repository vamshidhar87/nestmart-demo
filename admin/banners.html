<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banners — Padmavathi Traders Admin</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .banner-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }
    .banner-preview { height:90px; display:flex; flex-direction:column; justify-content:center; padding:16px 20px; border-radius:var(--radius-card) var(--radius-card) 0 0; }
    .banner-preview h3 { color:#fff; font-family:var(--font-heading); font-size:17px; font-weight:700; margin-bottom:4px; }
    .banner-preview p { color:rgba(255,255,255,.85); font-size:13px; }
    .banner-meta { padding:14px 16px; }
    .banner-meta-row { font-size:13px; color:var(--text-muted); margin-bottom:4px; }
    .banner-meta-row span { font-weight:600; color:var(--text-dark); }
    .banner-actions { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-top:1px solid var(--border-light); }
    .edit-fields { padding:12px 16px; border-top:1px solid var(--border-light); display:none; background:var(--bg-hover); }
    .edit-fields.show { display:block; }
  </style>
</head>
<body>
<script src="/js/data.js"></script>
<script src="/js/state.js"></script>
<script src="/js/components.js"></script>
<script>
injectAdminShell('/admin/banners');

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('admin-page-title').textContent = 'Banners & Promotions';

  const banners = NM_DATA.banners.map(b => ({...b}));

  function render() {
    document.getElementById('main-content').innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div style="font-size:13px;color:var(--text-muted)">${banners.length} banners</div>
        <button class="btn btn-primary" id="add-banner-btn">+ Add Banner</button>
      </div>
      <div class="banner-grid" id="banners-container">
        ${banners.map((b, idx) => `
          <div class="card" id="banner-card-${idx}">
            <div class="banner-preview" style="${b.gradient}">
              <h3>${b.title}</h3>
              <p>${b.subtitle}</p>
            </div>
            <div class="banner-meta">
              <div class="banner-meta-row">CTA: <span>${b.cta}</span></div>
              <div class="banner-meta-row">Link: <span>${b.link}</span></div>
              <div class="banner-meta-row">Order: <span>${b.order}</span></div>
            </div>
            <div class="banner-actions">
              <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer">
                <label class="toggle"><input type="checkbox" class="banner-active-toggle" data-idx="${idx}" ${b.active?'checked':''}><span class="toggle-slider"></span></label>
                <span>${b.active?'Active':'Inactive'}</span>
              </label>
              <div style="display:flex;gap:6px">
                <button class="btn btn-ghost btn-sm edit-banner-btn" data-idx="${idx}">✏️ Edit</button>
                <button class="btn btn-ghost btn-sm delete-banner-btn" data-idx="${idx}" style="color:var(--red)">🗑️</button>
              </div>
            </div>
            <div class="edit-fields" id="edit-fields-${idx}">
              <div class="grid-2" style="gap:8px;margin-bottom:8px">
                <div class="form-group" style="margin:0"><label class="form-label" style="font-size:11px">Title</label><input type="text" class="form-control" id="b-title-${idx}" value="${b.title}"></div>
                <div class="form-group" style="margin:0"><label class="form-label" style="font-size:11px">CTA Text</label><input type="text" class="form-control" id="b-cta-${idx}" value="${b.cta}"></div>
              </div>
              <div class="form-group" style="margin-bottom:8px"><label class="form-label" style="font-size:11px">Subtitle</label><input type="text" class="form-control" id="b-sub-${idx}" value="${b.subtitle}"></div>
              <div class="grid-2" style="gap:8px;margin-bottom:10px">
                <div class="form-group" style="margin:0"><label class="form-label" style="font-size:11px">Link</label><input type="text" class="form-control" id="b-link-${idx}" value="${b.link}"></div>
                <div class="form-group" style="margin:0"><label class="form-label" style="font-size:11px">Sort Order</label><input type="number" class="form-control" id="b-order-${idx}" value="${b.order}"></div>
              </div>
              <button class="btn btn-primary btn-sm save-banner-btn" data-idx="${idx}">Save Changes</button>
            </div>
          </div>
        `).join('')}
      </div>`;

    document.getElementById('add-banner-btn').addEventListener('click', () => {
      banners.push({ id: Date.now(), title:'New Banner', subtitle:'Banner subtitle', cta:'Learn More', link:'/shop', gradient:'linear-gradient(135deg,#1f6b4d,#3BB77E)', active:true, order: banners.length + 1 });
      render();
      showToast('Banner added!');
    });

    document.querySelectorAll('.edit-banner-btn').forEach(btn => btn.addEventListener('click', () => {
      const idx = +btn.dataset.idx;
      const fields = document.getElementById(`edit-fields-${idx}`);
      fields.classList.toggle('show');
      btn.textContent = fields.classList.contains('show') ? '✕ Cancel' : '✏️ Edit';
    }));

    document.querySelectorAll('.save-banner-btn').forEach(btn => btn.addEventListener('click', () => {
      const idx = +btn.dataset.idx;
      banners[idx].title = document.getElementById(`b-title-${idx}`).value;
      banners[idx].subtitle = document.getElementById(`b-sub-${idx}`).value;
      banners[idx].cta = document.getElementById(`b-cta-${idx}`).value;
      banners[idx].link = document.getElementById(`b-link-${idx}`).value;
      banners[idx].order = +document.getElementById(`b-order-${idx}`).value;
      render();
      showToast('Banner updated!');
    }));

    document.querySelectorAll('.delete-banner-btn').forEach(btn => btn.addEventListener('click', () => {
      const idx = +btn.dataset.idx;
      if (confirm('Delete this banner?')) {
        banners.splice(idx, 1);
        render();
        showToast('Banner deleted');
      }
    }));

    document.querySelectorAll('.banner-active-toggle').forEach(chk => chk.addEventListener('change', e => {
      const idx = +e.target.dataset.idx;
      banners[idx].active = e.target.checked;
      showToast(banners[idx].active ? 'Banner activated' : 'Banner deactivated');
      e.target.closest('.banner-actions').querySelector('span').textContent = banners[idx].active ? 'Active' : 'Inactive';
    }));
  }

  render();
});
</script>
</body>
</html>
