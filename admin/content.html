<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content CMS — Padmavathi Traders Admin</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<script src="/js/data.js"></script>
<script src="/js/state.js"></script>
<script src="/js/components.js"></script>
<script>
injectAdminShell('/admin/content');

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('admin-page-title').textContent = 'Content CMS';

  let activeTab = 'homepage';

  function render() {
    const tabs = [
      { key:'homepage', label:'🏠 Homepage' },
      { key:'about', label:'📖 About' },
      { key:'contact', label:'📞 Contact' }
    ];

    document.getElementById('main-content').innerHTML = `
      <div class="tabs" style="margin-bottom:24px">
        ${tabs.map(t => `<button class="tab-btn${activeTab===t.key?' active':''}" data-tab="${t.key}">${t.label}</button>`).join('')}
      </div>

      ${activeTab === 'homepage' ? `
        <div class="card">
          <div class="card-header"><span class="card-title">🏠 Homepage Content</span></div>
          <div class="card-body">
            <div class="form-group">
              <label class="form-label">Hero Headline</label>
              <input type="text" class="form-control" id="hero-headline" value="Quality Stationery &amp; Art Supplies">
            </div>
            <div class="form-group">
              <label class="form-label">Hero Subheadline</label>
              <input type="text" class="form-control" id="hero-sub" value="Trusted by 200+ schools and offices across Hyderabad since 1968">
            </div>
            <div class="grid-2">
              <div class="form-group">
                <label class="form-label">CTA Button Text</label>
                <input type="text" class="form-control" id="cta-text" value="Shop Now">
              </div>
              <div class="form-group">
                <label class="form-label">CTA Button Link</label>
                <input type="text" class="form-control" id="cta-link" value="/shop">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Announcement Bar Text</label>
              <input type="text" class="form-control" id="announcement" value="🎉 Back to School Sale — Up to 20% off on bulk orders!">
            </div>
            <div style="text-align:right">
              <button class="btn btn-primary" onclick="showToast('Homepage content saved!')">Save Changes</button>
            </div>
          </div>
        </div>
      ` : activeTab === 'about' ? `
        <div class="card">
          <div class="card-header"><span class="card-title">📖 About Page Content</span></div>
          <div class="card-body">
            <div class="form-group">
              <label class="form-label">Store Story</label>
              <textarea class="form-control" rows="5">Founded in 1968 by Padmavathi Devi, our store began as a small stationery shop in Abids, Hyderabad. Over five decades, we have grown to become one of Hyderabad's most trusted suppliers of stationery, art materials, and office supplies.</textarea>
            </div>
            <div class="grid-2">
              <div class="form-group"><label class="form-label">Founder 1 Name</label><input type="text" class="form-control" value="Padmavathi Devi"></div>
              <div class="form-group"><label class="form-label">Founder 1 Role</label><input type="text" class="form-control" value="Founder & Visionary"></div>
            </div>
            <div class="grid-2">
              <div class="form-group"><label class="form-label">Founder 2 Name</label><input type="text" class="form-control" value="Ravi Kumar Sharma"></div>
              <div class="form-group"><label class="form-label">Founder 2 Role</label><input type="text" class="form-control" value="Managing Director"></div>
            </div>
            <div class="form-group">
              <label class="form-label">Mission Statement</label>
              <textarea class="form-control" rows="3">To provide quality stationery and art supplies at honest prices, serving every student, artist and office in Hyderabad.</textarea>
            </div>
            <div style="text-align:right">
              <button class="btn btn-primary" onclick="showToast('About content saved!')">Save Changes</button>
            </div>
          </div>
        </div>
      ` : `
        <div class="card">
          <div class="card-header"><span class="card-title">📞 Contact Information</span></div>
          <div class="card-body">
            <div class="form-group">
              <label class="form-label">Address</label>
              <input type="text" class="form-control" value="15-2-1, Abids Main Road, Hyderabad 500001">
            </div>
            <div class="grid-2">
              <div class="form-group"><label class="form-label">Phone</label><input type="text" class="form-control" value="+91 40 2461 1234"></div>
              <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-control" value="info@padmavathi.com"></div>
            </div>
            <div class="grid-2">
              <div class="form-group"><label class="form-label">Business Hours</label><input type="text" class="form-control" value="Mon–Sat 9am–7pm, Sun 10am–4pm"></div>
              <div class="form-group"><label class="form-label">WhatsApp Number</label><input type="text" class="form-control" value="+91 98765 43210"></div>
            </div>
            <div class="grid-2">
              <div class="form-group"><label class="form-label">Facebook URL</label><input type="url" class="form-control" placeholder="https://facebook.com/..."></div>
              <div class="form-group"><label class="form-label">Instagram URL</label><input type="url" class="form-control" placeholder="https://instagram.com/..."></div>
            </div>
            <div style="text-align:right">
              <button class="btn btn-primary" onclick="showToast('Contact details saved!')">Save Changes</button>
            </div>
          </div>
        </div>
      `}`;

    document.querySelectorAll('[data-tab]').forEach(btn => btn.addEventListener('click', () => { activeTab = btn.dataset.tab; render(); }));
  }

  render();
});
</script>
</body>
</html>
