<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Padmavathi Traders Admin</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* ── Dashboard-specific tokens ── */
    :root {
      --kpi-quote-bg:   #fef3c7;
      --kpi-quote-fg:   #92400e;
      --kpi-quote-icon: #F59E0B;
      --kpi-order-bg:   #dbeafe;
      --kpi-order-fg:   #1e40af;
      --kpi-order-icon: #3B82F6;
      --kpi-rev-bg:     #d1fae5;
      --kpi-rev-fg:     #065f46;
      --kpi-rev-icon:   #059669;
      --kpi-enq-bg:     #ede9fe;
      --kpi-enq-fg:     #4c1d95;
      --kpi-enq-icon:   #7c3aed;
      --kpi-stock-bg:   #fee2e2;
      --kpi-stock-fg:   #991b1b;
      --kpi-stock-icon: #EF4444;
    }

    /* ── KPI cards — override base for coloured accent strip ── */
    .kpi-card {
      position: relative;
      overflow: hidden;
      padding: 20px;
    }
    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: var(--radius-card) var(--radius-card) 0 0;
    }
    .kpi-card.kc-quote::before  { background: var(--kpi-quote-icon); }
    .kpi-card.kc-order::before  { background: var(--kpi-order-icon); }
    .kpi-card.kc-rev::before    { background: var(--kpi-rev-icon); }
    .kpi-card.kc-enq::before    { background: var(--kpi-enq-icon); }
    .kpi-card.kc-stock::before  { background: var(--kpi-stock-icon); }

    .kpi-icon-wrap {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .kc-quote  .kpi-icon-wrap { background: var(--kpi-quote-bg); }
    .kc-order  .kpi-icon-wrap { background: var(--kpi-order-bg); }
    .kc-rev    .kpi-icon-wrap { background: var(--kpi-rev-bg); }
    .kc-enq    .kpi-icon-wrap { background: var(--kpi-enq-bg); }
    .kc-stock  .kpi-icon-wrap { background: var(--kpi-stock-bg); }

    .kpi-value {
      font-variant-numeric: tabular-nums;
      font-size: 30px;
      line-height: 1;
    }
    .kc-quote  .kpi-value { color: var(--kpi-quote-fg); }
    .kc-order  .kpi-value { color: var(--kpi-order-fg); }
    .kc-rev    .kpi-value { color: var(--kpi-rev-fg); }
    .kc-enq    .kpi-value { color: var(--kpi-enq-fg); }
    .kc-stock  .kpi-value { color: var(--kpi-stock-fg); }

    .kpi-trend {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 11px; font-weight: 600;
      padding: 2px 7px; border-radius: 20px;
      margin-top: 6px;
    }
    .kpi-trend.up   { background: #d1fae5; color: #065f46; }
    .kpi-trend.warn { background: #fef3c7; color: #92400e; }
    .kpi-trend.crit { background: #fee2e2; color: #991b1b; }
    .kpi-trend.neu  { background: #f1f5f9; color: #475569; }

    /* ── Dashboard two-column layout ── */
    .dash-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    .dash-row.wide-left  { grid-template-columns: 1.55fr 1fr; }
    .dash-row.wide-right { grid-template-columns: 1fr 1.55fr; }

    /* ── Bar chart ── */
    .chart-wrap {
      padding: 0 4px;
      height: 160px;
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }
    .chart-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      justify-content: flex-end;
      gap: 6px;
      position: relative;
    }
    .chart-bar {
      width: 100%;
      border-radius: 5px 5px 0 0;
      background: var(--green-light);
      position: relative;
      transition: background .15s;
      cursor: default;
      min-height: 4px;
    }
    .chart-bar:hover { background: var(--green-mid); }
    .chart-bar.peak  { background: var(--green-mid); }
    .chart-bar:hover .chart-tooltip,
    .chart-bar.peak:hover .chart-tooltip { opacity: 1; transform: translateY(0); }
    .chart-tooltip {
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%; transform: translateX(-50%) translateY(4px);
      background: var(--text-dark);
      color: #fff;
      font-size: 11px; font-weight: 600;
      padding: 4px 8px;
      border-radius: 5px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity .15s, transform .15s;
      pointer-events: none;
      font-variant-numeric: tabular-nums;
      z-index: 10;
    }
    .chart-tooltip::after {
      content: '';
      position: absolute;
      top: 100%; left: 50%;
      transform: translateX(-50%);
      border: 4px solid transparent;
      border-top-color: var(--text-dark);
    }
    .chart-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-align: center;
      letter-spacing: .3px;
    }
    .chart-grid {
      position: relative;
    }
    .chart-axis-labels {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .chart-axis-label {
      font-size: 11px;
      color: var(--text-light);
      font-variant-numeric: tabular-nums;
    }

    /* ── Revenue summary bar ── */
    .rev-summary {
      display: flex;
      gap: 24px;
      padding: 14px 0 18px;
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 16px;
    }
    .rev-summary-item {}
    .rev-summary-label {
      font-size: 11px; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: .4px;
      margin-bottom: 2px;
    }
    .rev-summary-val {
      font-family: var(--font-heading);
      font-size: 18px; font-weight: 700;
      color: var(--text-dark);
      font-variant-numeric: tabular-nums;
    }
    .rev-summary-val.green { color: var(--green-dark); }

    /* ── Activity table tweaks ── */
    .activity-type-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 4px;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .4px;
    }
    .activity-type-badge.order { background: #dbeafe; color: #1e40af; }
    .activity-type-badge.quote { background: #fef3c7; color: #92400e; }

    .status-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
      white-space: nowrap;
    }

    /* ── Top products list ── */
    .top-product-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border-light);
    }
    .top-product-row:last-child { border-bottom: none; }
    .top-product-rank {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--green-light);
      color: var(--green-dark);
      font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .top-product-rank.gold { background: #fef3c7; color: #92400e; }
    .top-product-emoji {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, #f0fdf4, #d1fae5);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .top-product-info { flex: 1; min-width: 0; }
    .top-product-name {
      font-size: 13px; font-weight: 600; color: var(--text-dark);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .top-product-cat  { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .top-product-bar-wrap {
      flex: 1;
      background: var(--border-light);
      border-radius: 20px; height: 6px;
      overflow: hidden;
    }
    .top-product-bar {
      height: 100%; border-radius: 20px;
      background: var(--green-mid);
      transition: width .4s ease;
    }
    .top-product-count {
      font-size: 12px; font-weight: 700;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      width: 28px; text-align: right; flex-shrink: 0;
    }

    /* ── Quick actions card ── */
    .quick-action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .quick-action-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border-light);
      background: var(--bg-page);
      cursor: pointer;
      transition: all .15s;
      text-align: left;
      text-decoration: none;
    }
    .quick-action-btn:hover {
      border-color: var(--green-mid);
      background: var(--green-light);
    }
    .quick-action-icon {
      width: 34px; height: 34px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0;
    }
    .quick-action-label {
      font-size: 13px; font-weight: 600; color: var(--text-dark); line-height: 1.3;
    }
    .quick-action-sub {
      font-size: 11px; color: var(--text-muted); line-height: 1.3;
    }

    /* ── Date/greeting bar ── */
    .dash-greeting {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .dash-greeting-text h1 {
      font-family: var(--font-heading);
      font-size: 22px; font-weight: 700;
      color: var(--text-dark);
      line-height: 1.2;
      text-wrap: balance;
    }
    .dash-greeting-text p {
      font-size: 13px; color: var(--text-muted); margin-top: 3px;
    }
    .dash-greeting-date {
      text-align: right;
    }
    .dash-greeting-date .date-big {
      font-family: var(--font-heading);
      font-size: 14px; font-weight: 600;
      color: var(--text-dark);
    }
    .dash-greeting-date .date-sub {
      font-size: 12px; color: var(--text-muted); margin-top: 2px;
    }
    .live-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green-mid);
      margin-right: 5px;
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: .35; }
    }

    /* ── Section divider with label ── */
    .section-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 4px 0 16px;
    }
    .section-divider span {
      font-size: 11px; font-weight: 700;
      color: var(--text-light); text-transform: uppercase; letter-spacing: .6px;
      white-space: nowrap;
    }
    .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-light);
    }

    /* ── Responsive ── */
    @media (max-width: 1024px) {
      .dash-row         { grid-template-columns: 1fr; }
      .dash-row.wide-left  { grid-template-columns: 1fr; }
      .dash-row.wide-right { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .rev-summary { flex-wrap: wrap; gap: 14px; }
      .quick-action-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<script src="/js/data.js"></script>
<script src="/js/state.js"></script>
<script src="/js/components.js"></script>
<script>
  injectAdminShell('/admin/dashboard');
</script>

<script>
(function() {
  // ── Set page title ──────────────────────────────────────────
  document.getElementById('admin-page-title').textContent = 'Dashboard';

  // ── Compute KPIs from NM_DATA ───────────────────────────────
  const data = NM_DATA;

  const pendingQuotes  = data.quotes.filter(q => q.status === 'Needs Review').length;
  const activeOrders   = data.orders.filter(o => o.status === 'Ready to Dispatch' || o.status === 'Dispatched' || o.status === 'Processing').length;
  const todayRevenue   = '₹3,42,800';  // matches mockup KPI
  const openEnquiries  = data.enquiries ? data.enquiries.filter(e => e.status === 'New').length : 0;
  const lowStockItems  = data.products.filter(p => p.stock != null && p.stock < 50).length;

  // ── Revenue chart data ──────────────────────────────────────
  const chartValues = [42000, 38000, 65000, 29000, 51000, 74000, 48500];
  const chartLabels = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  const chartMax    = Math.max(...chartValues);
  const chartTotal  = chartValues.reduce((a, b) => a + b, 0);
  const chartAvg    = Math.round(chartTotal / chartValues.length);

  function fmtK(n) {
    if (n >= 100000) return '₹' + (n / 100000).toFixed(1) + 'L';
    if (n >= 1000)   return '₹' + (n / 1000).toFixed(0) + 'K';
    return '₹' + n;
  }

  // ── Recent Activity: last 5 orders + last 3 quotes ──────────
  const activityItems = [
    ...data.orders.slice(0, 5).map(o => ({
      type: 'Order', id: o.id, customer: o.customerName,
      amount: o.total, status: o.status, date: o.date
    })),
    ...data.quotes.slice(0, 3).map(q => ({
      type: 'Quote', id: q.id, customer: q.customerName,
      amount: q.total, status: q.status, date: q.date
    }))
  ].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 8);

  // ── Top products ────────────────────────────────────────────
  const topProductIds    = [18, 5, 1, 11, 9];
  const topProductCounts = [8, 7, 6, 5, 4];
  const topProducts = topProductIds.map((id, i) => ({
    product: data.products.find(p => p.id === id),
    count: topProductCounts[i]
  }));

  // ── Status badge helper ─────────────────────────────────────
  function statusBadge(status) {
    const map = {
      'Ready to Dispatch': 'badge-blue',
      'Dispatched':        'badge-purple',
      'Delivered':         'badge-green',
      'Cancelled':         'badge-red',
      'Needs Review':      'badge-amber',
      'Awaiting Customer': 'badge-blue',
      'Revision':          'badge-gray',
      'Approved':          'badge-green',
      'Rejected':          'badge-red'
    };
    return `<span class="badge ${map[status] || 'badge-gray'}">${status}</span>`;
  }

  function formatDate(d) {
    const date = new Date(d);
    return date.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  // ── Build greeting ──────────────────────────────────────────
  const now = new Date();
  const hour = now.getHours();
  const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  const dayStr = now.toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  // ── Render chart bars ────────────────────────────────────────
  const chartBarsHTML = chartValues.map((val, i) => {
    const heightPct = Math.round((val / chartMax) * 100);
    const isPeak    = val === chartMax;
    return `
      <div class="chart-col">
        <div class="chart-bar${isPeak ? ' peak' : ''}" style="height:${heightPct}%">
          <div class="chart-tooltip">${fmtK(val)}</div>
        </div>
        <div class="chart-label">${chartLabels[i]}</div>
      </div>`;
  }).join('');

  // ── Render activity rows ─────────────────────────────────────
  const activityRowsHTML = activityItems.map(item => `
    <tr>
      <td>
        <span class="activity-type-badge ${item.type === 'Order' ? 'order' : 'quote'}">
          ${item.type === 'Order' ? '📦' : '📋'} ${item.type}
        </span>
      </td>
      <td style="font-family:monospace;font-size:12px;color:var(--text-muted)">${item.id}</td>
      <td style="font-size:13px;font-weight:500;color:var(--text-dark);max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${item.customer}</td>
      <td style="font-variant-numeric:tabular-nums;font-weight:600;color:var(--text-dark)">${NM.fmt(item.amount)}</td>
      <td>${statusBadge(item.status)}</td>
      <td style="font-size:12px;color:var(--text-muted);white-space:nowrap">${formatDate(item.date)}</td>
    </tr>
  `).join('');

  // ── Render top products ──────────────────────────────────────
  const maxCount = topProductCounts[0];
  const topProductsHTML = topProducts.map(({ product, count }, i) => {
    const barW = Math.round((count / maxCount) * 100);
    const rankClass = i === 0 ? 'gold' : '';
    return `
      <div class="top-product-row">
        <div class="top-product-rank ${rankClass}">${i + 1}</div>
        <div class="top-product-emoji" style="overflow:hidden;background:#f5f5f5">
          ${product.img ? `<img src="${product.img}" alt="" style="width:100%;height:100%;object-fit:cover;display:block;">` : '📦'}
        </div>
        <div class="top-product-info">
          <div class="top-product-name">${product.name}</div>
          <div class="top-product-cat">${product.category}</div>
        </div>
        <div style="width:80px">
          <div class="top-product-bar-wrap">
            <div class="top-product-bar" style="width:${barW}%"></div>
          </div>
        </div>
        <div class="top-product-count">${count}×</div>
      </div>`;
  }).join('');

  // ── Write to #main-content ───────────────────────────────────
  document.getElementById('main-content').innerHTML = `

    <!-- Greeting bar -->
    <div class="dash-greeting">
      <div class="dash-greeting-text">
        <h1>${greeting}, Ravi 👋</h1>
        <p><span class="live-dot"></span>Live data · Padmavathi Traders Admin Console</p>
      </div>
      <div class="dash-greeting-date">
        <div class="date-big">${dayStr}</div>
        <div class="date-sub">Hyderabad, Telangana</div>
      </div>
    </div>

    <!-- KPI grid -->
    <div class="kpi-grid" style="margin-bottom:24px">

      <div class="kpi-card card kc-quote">
        <div class="kpi-icon-wrap">📋</div>
        <div class="kpi-label">Pending Quotes</div>
        <div class="kpi-value">${pendingQuotes}</div>
        <div class="kpi-trend warn">Needs Review</div>
      </div>

      <div class="kpi-card card kc-order">
        <div class="kpi-icon-wrap">📦</div>
        <div class="kpi-label">Active Orders</div>
        <div class="kpi-value">${activeOrders}</div>
        <div class="kpi-trend up">In pipeline</div>
      </div>

      <div class="kpi-card card kc-rev">
        <div class="kpi-icon-wrap">💰</div>
        <div class="kpi-label">Today's Revenue</div>
        <div class="kpi-value" style="font-size:22px">${todayRevenue}</div>
        <div class="kpi-trend up">+12% vs yesterday</div>
      </div>

      <div class="kpi-card card kc-enq">
        <div class="kpi-icon-wrap">💬</div>
        <div class="kpi-label">Open Enquiries</div>
        <div class="kpi-value">${openEnquiries}</div>
        <div class="kpi-trend warn">Unread</div>
      </div>

      <div class="kpi-card card kc-stock">
        <div class="kpi-icon-wrap">⚠️</div>
        <div class="kpi-label">Low Stock Items</div>
        <div class="kpi-value">${lowStockItems}</div>
        <div class="kpi-trend crit">Below 50 units</div>
      </div>

    </div>

    <!-- Row 1: Revenue chart + Recent activity -->
    <div class="dash-row wide-left" style="margin-bottom:20px">

      <!-- Revenue chart card -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Revenue — Last 7 Days</span>
          <span class="badge badge-green">This Week</span>
        </div>
        <div class="card-body">
          <div class="rev-summary">
            <div class="rev-summary-item">
              <div class="rev-summary-label">Week Total</div>
              <div class="rev-summary-val green">${fmtK(chartTotal)}</div>
            </div>
            <div class="rev-summary-item">
              <div class="rev-summary-label">Daily Avg</div>
              <div class="rev-summary-val">${fmtK(chartAvg)}</div>
            </div>
            <div class="rev-summary-item">
              <div class="rev-summary-label">Peak Day</div>
              <div class="rev-summary-val">Saturday · ${fmtK(chartMax)}</div>
            </div>
          </div>
          <div class="chart-wrap">
            ${chartBarsHTML}
          </div>
        </div>
      </div>

      <!-- Recent activity card -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Recent Activity</span>
          <a href="/admin/orders.html" style="font-size:13px;color:var(--green-dark);font-weight:600">View all →</a>
        </div>
        <div class="table-wrap" style="max-height:320px;overflow-y:auto">
          <table class="table">
            <thead>
              <tr>
                <th>Type</th>
                <th>ID</th>
                <th>Customer</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody>
              ${activityRowsHTML}
            </tbody>
          </table>
        </div>
      </div>

    </div>

    <!-- Row 2: Top products + Quick actions -->
    <div class="dash-row wide-right" style="margin-bottom:20px">

      <!-- Quick actions -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Quick Actions</span>
        </div>
        <div class="card-body">
          <div class="quick-action-grid">
            <a href="/admin/quotes.html" class="quick-action-btn">
              <div class="quick-action-icon" style="background:#fef3c7">📋</div>
              <div>
                <div class="quick-action-label">Review Quotes</div>
                <div class="quick-action-sub">${pendingQuotes} awaiting</div>
              </div>
            </a>
            <a href="/admin/orders.html" class="quick-action-btn">
              <div class="quick-action-icon" style="background:#dbeafe">📦</div>
              <div>
                <div class="quick-action-label">Manage Orders</div>
