<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — Padmavathi Traders Admin</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .product-thumb { width:42px;height:42px;border-radius:8px;object-fit:cover;flex-shrink:0;display:block; }
  </style>
</head>
<body>
<script src="/js/data.js"></script>
<script src="/js/state.js"></script>
<script src="/js/components.js"></script>
<script>
injectAdminShell('/admin/products');

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('admin-page-title').textContent = 'Products';

  const CAT_EMOJI = {
    'Pens & Writing': '🖊️', 'Notebooks & Journals': '📓', 'Art & Craft': '🎨',
    'Office Supplies': '📎', 'Paper & Notepads': '📄', 'School Supplies': '🎒',
    'Markers & Highlighters': '🖍️', 'Files & Folders': '📁',
    'Desk Accessories': '🖥️', 'Bags & Cases': '👜'
  };
  const genSku = p => 'TVR-' + String(p.id).padStart(4, '0');

  let filterCat = 'All', filterStatus = 'All', searchQ = '';
  let currentPage = 1;
  const PER_PAGE = 10;
  let editProduct = null;

  function filtered() {
    return NM_DATA.products.filter(p => {
      const mc = filterCat === 'All' || p.category === filterCat;
      const ms = filterStatus === 'All' || (filterStatus === 'In Stock' ? p.inStock : !p.inStock);
      const q = searchQ.toLowerCase();
      const mq = !q || p.name.toLowerCase().includes(q) || genSku(p).toLowerCase().includes(q) || p.brand.toLowerCase().includes(q);
      return mc && ms && mq;
    });
  }

  function openModal(product) {
    editProduct = product;
    document.getElementById('modal-overlay').classList.add('open');
    if (product) {
      document.getElementById('modal-title').textContent = 'Edit Product';
      document.getElementById('p-name').value = product.name;
      document.getElementById('p-sku').value = genSku(product);
      document.getElementById('p-cat').value = product.category;
      document.getElementById('p-price').value = product.price;
      document.getElementById('p-orig').value = product.sale || '';
      document.getElementById('p-stock').value = product.inStock ? 'In Stock' : 'Out of Stock';
      document.getElementById('p-emoji').value = CAT_EMOJI[product.category] || '📦';
    } else {
      document.getElementById('modal-title').textContent = 'Add Product';
      document.getElementById('p-name').value = '';
      document.getElementById('p-sku').value = '';
      document.getElementById('p-price').value = '';
      document.getElementById('p-orig').value = '';
      document.getElementById('p-stock').value = '';
      document.getElementById('p-emoji').value = '📦';
    }
  }

  function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

  function render() {
    const all = filtered();
    const total = all.length;
    const pages = Math.ceil(total / PER_PAGE);
    const products = all.slice((currentPage-1)*PER_PAGE, currentPage*PER_PAGE);
    const cats = ['All', ...NM_DATA.categories.map(c => c.name)];

    document.getElementById('main-content').innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <select class="form-control" id="cat-filter" style="width:180px">
            ${cats.map(c => `<option value="${c}"${filterCat===c?' selected':''}>${c}</option>`).join('')}
          </select>
          <select class="form-control" id="status-filter" style="width:140px">
            <option value="All"${filterStatus==='All'?' selected':''}>All Status</option>
            <option value="In Stock"${filterStatus==='In Stock'?' selected':''}>In Stock</option>
            <option value="Out of Stock"${filterStatus==='Out of Stock'?' selected':''}>Out of Stock</option>
          </select>
          <div class="search-bar" style="width:220px">
            <span class="search-bar-icon">🔍</span>
            <input type="text" id="search-input" placeholder="Search products…" value="${searchQ}">
          </div>
        </div>
        <button class="btn btn-primary" id="add-btn">+ Add Product</button>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">Products</span>
          <span style="font-size:13px;color:var(--text-muted)">Showing ${(currentPage-1)*PER_PAGE+1}–${Math.min(currentPage*PER_PAGE,total)} of ${total}</span>
        </div>
        <div class="table-wrap">
          <table class="table">
            <thead><tr><th style="width:36px"><input type="checkbox"></th><th>Product</th><th>Category</th><th>Price</th><th>On Sale</th><th>Stock</th><th style="width:80px">Actions</th></tr></thead>
            <tbody>
              ${products.map(p => `
                <tr>
                  <td><input type="checkbox"></td>
                  <td>
                    <div style="display:flex;align-items:center;gap:10px">
                      <img src="${p.img}" class="product-thumb" style="object-fit:cover" alt="${p.name}">
                      <div>
                        <div style="font-weight:600;color:var(--text-dark)">${p.name}</div>
                        <div style="font-size:11px;color:var(--text-muted)">SKU: ${genSku(p)} · ${p.brand}</div>
                      </div>
                    </div>
                  </td>
                  <td><span class="badge badge-gray">${p.category}</span></td>
                  <td>
                    <div style="font-weight:700;color:var(--green-dark)">${NM.fmt(p.price)}</div>
                    ${p.originalPrice ? `<div style="font-size:12px;color:var(--text-muted);text-decoration:line-through">${NM.fmt(p.originalPrice)}</div>` : ''}
                  </td>
                  <td>
                    <label class="toggle">
                      <input type="checkbox" ${p.sale?'checked':''} onchange="showToast('Product updated!')">
                      <span class="toggle-slider"></span>
                    </label>
                  </td>
                  <td>
                    ${p.inStock
                      ? `<span class="badge badge-green">In Stock</span>`
                      : `<span class="badge badge-red">Out of Stock</span>`}
                  </td>
                  <td>
                    <div style="display:flex;gap:6px">
                      <button class="btn btn-icon btn-ghost edit-btn" data-id="${p.id}" title="Edit">✏️</button>
                      <button class="btn btn-icon btn-ghost" onclick="showToast('Product deleted!')" title="Delete">🗑️</button>
                    </div>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
        ${pages > 1 ? `<div class="pagination" style="padding:16px">
          ${Array.from({length:pages},(_,i)=>`<button class="pagination-btn${currentPage===i+1?' active':''}" data-page="${i+1}">${i+1}</button>`).join('')}
        </div>` : ''}
      </div>

      <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
          <div class="modal-header">
            <span class="modal-title" id="modal-title">Add Product</span>
            <button class="modal-close" id="modal-close">✕</button>
          </div>
          <div class="modal-body">
            <div class="grid-2">
              <div class="form-group"><label class="form-label">Product Name *</label><input type="text" class="form-control" id="p-name"></div>
              <div class="form-group"><label class="form-label">SKU *</label><input type="text" class="form-control" id="p-sku"></div>
            </div>
            <div class="grid-2">
              <div class="form-group"><label class="form-label">Category</label><select class="form-control" id="p-cat">${NM_DATA.categories.map(c=>`<option>${c.name}</option>`).join('')}</select></div>
              <div class="form-group"><label class="form-label">Emoji / Icon</label><input type="text" class="form-control" id="p-emoji" placeholder="📦"></div>
            </div>
            <div class="grid-2">
              <div class="form-group"><label class="form-label">Price (₹) *</label><input type="number" class="form-control" id="p-price"></div>
              <div class="form-group"><label class="form-label">Original Price (₹)</label><input type="number" class="form-control" id="p-orig" placeholder="Optional"></div>
            </div>
            <div class="form-group"><label class="form-label">Stock Quantity</label><input type="number" class="form-control" id="p-stock"></div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
            <button class="btn btn-primary" id="modal-save">Save Product</button>
          </div>
        </div>
      </div>`;

    document.getElementById('add-btn').addEventListener('click', () => openModal(null));
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-cancel').addEventListener('click', closeModal);
    document.getElementById('modal-overlay').addEventListener('click', e => { if(e.target === document.getElementById('modal-overlay')) closeModal(); });
    document.getElementById('modal-save').addEventListener('click', () => { closeModal(); showToast('Product saved!'); });
    document.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', () => {
      const p = NM_DATA.products.find(p => p.id === +btn.dataset.id);
      if (p) openModal(p);
    }));
    document.getElementById('cat-filter').addEventListener('change', e => { filterCat = e.target.value; currentPage=1; render(); });
    document.getElementById('status-filter').addEventListener('change', e => { filterStatus = e.target.value; currentPage=1; render(); });
    document.getElementById('search-input').addEventListener('input', e => { searchQ = e.target.value; currentPage=1; render(); });
    document.querySelectorAll('.pagination-btn').forEach(btn => btn.addEventListener('click', () => { currentPage = +btn.dataset.page; render(); }));
  }

  render();
});
</script>
</body>
</html>
