<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart & Quote Request — Padmavathi Traders</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* ── Page scaffold ── */
    .cart-page {
      padding: 32px 0 64px;
    }

    .cart-page-heading {
      font-family: var(--font-heading);
      font-size: 26px;
      font-weight: 700;
      color: var(--text-dark);
      text-wrap: balance;
      margin-bottom: 6px;
    }

    .cart-page-sub {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    /* ── Two-column layout ── */
    .cart-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 24px;
      align-items: start;
    }

    /* ── Cart items card ── */
    .cart-items-card {
      background: var(--bg-page);
      border-radius: var(--radius-card);
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .cart-items-head {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cart-items-title {
      font-family: var(--font-heading);
      font-size: 15px;
      font-weight: 700;
      color: var(--text-dark);
    }

    .cart-count-pill {
      background: var(--green-light);
      color: var(--green-dark);
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ── Cart row ── */
    .cart-row {
      display: grid;
      grid-template-columns: 64px 1fr auto auto auto;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-light);
      transition: background .15s;
    }

    .cart-row:last-child {
      border-bottom: none;
    }

    .cart-row:hover {
      background: var(--bg-hover);
    }

    .cart-row-thumb {
      width: 64px;
      height: 64px;
      border-radius: 9px;
      background: linear-gradient(135deg, #f0fdf4, #d1fae5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }

    .cart-row-info {
      min-width: 0;
    }

    .cart-row-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dark);
      line-height: 1.35;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cart-row-unit {
      font-size: 13px;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    /* qty stepper inline */
    .cart-qty-stepper {
      display: flex;
      align-items: center;
      gap: 0;
      flex-shrink: 0;
    }

    .cart-qty-stepper button {
      width: 30px;
      height: 30px;
      border: 1.5px solid var(--border);
      background: var(--bg-page);
      color: var(--text-dark);
      font-size: 17px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .13s, border-color .13s;
    }

    .cart-qty-stepper button:first-child {
      border-radius: 6px 0 0 6px;
    }

    .cart-qty-stepper button:last-child {
      border-radius: 0 6px 6px 0;
    }

    .cart-qty-stepper button:hover {
      background: var(--green-light);
      border-color: var(--green-mid);
      color: var(--green-dark);
    }

    .cart-qty-stepper span {
      min-width: 36px;
      height: 30px;
      border-top: 1.5px solid var(--border);
      border-bottom: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-dark);
      font-variant-numeric: tabular-nums;
    }

    .cart-row-total {
      font-size: 15px;
      font-weight: 700;
      color: var(--green-dark);
      min-width: 80px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .cart-row-remove {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-light);
      background: transparent;
      cursor: pointer;
      font-size: 15px;
      transition: background .13s, color .13s;
      border: none;
      flex-shrink: 0;
    }

    .cart-row-remove:hover {
      background: #fee2e2;
      color: var(--red);
    }

    /* ── Summary panel (sticky) ── */
    .cart-summary-card {
      background: var(--bg-page);
      border-radius: var(--radius-card);
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      position: sticky;
      top: 84px;
    }

    .cart-summary-head {
      background: var(--green-light);
      padding: 16px 20px;
      border-bottom: 1px solid #c8f0db;
    }

    .cart-summary-head-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--green-dark);
      margin-bottom: 4px;
    }

    .cart-summary-total {
      font-family: var(--font-heading);
      font-size: 28px;
      font-weight: 700;
      color: var(--green-dark);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .cart-summary-total-sub {
      font-size: 12px;
      color: #3d8a5e;
      margin-top: 4px;
    }

    .cart-summary-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .cart-summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: var(--text-muted);
    }

    .cart-summary-row strong {
      color: var(--text-dark);
      font-weight: 600;
    }

    .cart-summary-divider {
      height: 1px;
      background: var(--border-light);
    }

    .cart-summary-notice {
      font-size: 12px;
      color: var(--text-muted);
      background: #fef9ec;
      border: 1px solid #fde68a;
      border-radius: 7px;
      padding: 10px 12px;
      line-height: 1.5;
    }

    .cart-summary-notice strong {
      color: #92400e;
    }

    .quote-cta-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 13px 20px;
      background: var(--green-mid);
      color: #fff;
      border: none;
      border-radius: var(--radius-btn);
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background .16s;
    }

    .quote-cta-btn:hover {
      background: var(--green-dark);
    }

    .cart-summary-whatsapp {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      padding: 10px 16px;
      background: #f0fdf4;
      color: var(--green-dark);
      border: 1.5px solid var(--green-mid);
      border-radius: var(--radius-btn);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background .16s;
    }

    .cart-summary-whatsapp:hover {
      background: var(--green-light);
    }

    /* ── Quote form ── */
    .quote-form-section {
      margin-top: 24px;
    }

    .quote-form-card {
      background: var(--bg-page);
      border-radius: var(--radius-card);
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .quote-form-head {
      padding: 20px 24px 18px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .quote-form-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: var(--green-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .quote-form-head-text h2 {
      font-family: var(--font-heading);
      font-size: 18px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 3px;
    }

    .quote-form-head-text p {
      font-size: 13px;
      color: var(--text-muted);
    }

    .quote-form-body {
      padding: 24px;
    }

    .quote-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 20px;
    }

    .quote-form-grid .form-group:last-child,
    .quote-form-grid .full-col {
      grid-column: 1 / -1;
    }

    .form-label-optional {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-light);
      margin-left: 4px;
    }

    .quote-submit-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding-top: 8px;
    }

    .quote-submit-info {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .quote-submit-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      background: var(--green-dark);
      color: #fff;
      border: none;
      border-radius: var(--radius-btn);
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: background .16s, transform .12s;
    }

    .quote-submit-btn:hover {
      background: #155239;
      transform: translateY(-1px);
    }

    .quote-submit-btn:active {
      transform: translateY(0);
    }

    /* ── Empty state ── */
    .cart-empty-page {
      text-align: center;
      padding: 80px 20px;
    }

    .cart-empty-page-icon {
      font-size: 72px;
      margin-bottom: 20px;
      display: block;
      line-height: 1;
    }

    .cart-empty-page h2 {
      font-family: var(--font-heading);
      font-size: 24px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 10px;
    }

    .cart-empty-page p {
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 28px;
      max-width: 380px;
      margin-left: auto;
      margin-right: auto;
    }

    .cart-empty-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* ── Success state ── */
    .cart-success-page {
      text-align: center;
      padding: 72px 20px;
    }

    .cart-success-check {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: var(--green-light);
      border: 3px solid var(--green-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      margin: 0 auto 24px;
      animation: successPop .4s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes successPop {
      from { transform: scale(.5); opacity: 0; }
      to   { transform: scale(1);  opacity: 1; }
    }

    .cart-success-page h2 {
      font-family: var(--font-heading);
      font-size: 26px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 12px;
      text-wrap: balance;
    }

    .cart-success-page p {
      font-size: 15px;
      color: var(--text-muted);
      max-width: 460px;
      margin: 0 auto 12px;
      line-height: 1.6;
    }

    .cart-success-ref {
      display: inline-block;
      font-size: 13px;
      color: var(--green-dark);
      background: var(--green-light);
      border: 1px solid #c8f0db;
      border-radius: 6px;
      padding: 6px 16px;
      font-weight: 600;
      margin-bottom: 28px;
      font-variant-numeric: tabular-nums;
    }

    .cart-success-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .cart-success-timeline {
      max-width: 420px;
      margin: 28px auto 0;
      background: #f8fafc;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-card);
      padding: 20px;
      text-align: left;
    }

    .cart-success-timeline h4 {
      font-family: var(--font-heading);
      font-size: 13px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .timeline-item {
      display: flex;
      gap: 12px;
      padding-bottom: 14px;
      position: relative;
    }

    .timeline-item:last-child {
      padding-bottom: 0;
    }

    .timeline-item:not(:last-child)::before {
      content: '';
      position: absolute;
      left: 11px;
      top: 24px;
      bottom: 0;
      width: 1.5px;
      background: var(--border);
    }

    .timeline-dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--green-light);
      border: 2px solid var(--green-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .timeline-text strong {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dark);
    }

    .timeline-text span {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── Breadcrumb ── */
    .cart-breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .cart-breadcrumb a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color .13s;
    }

    .cart-breadcrumb a:hover {
      color: var(--green-dark);
    }

    .cart-breadcrumb span {
      color: var(--text-light);
    }

    .cart-breadcrumb .current {
      color: var(--text-dark);
      font-weight: 500;
    }

    /* ── Buyer type chips ── */
    .buyer-chip {
      font-size: 12.5px;
      font-weight: 700;
      padding: 9px 14px;
      border-radius: 10px;
      cursor: pointer;
      border: 1.4px solid var(--border);
      background: #fff;
      color: var(--text-muted);
      font-family: var(--font-body);
      transition: all .15s;
    }
    .buyer-chip.active {
      border-color: var(--green-mid);
      background: var(--green-light);
      color: var(--green-dark);
    }
    .buyer-chip:hover:not(.active) { border-color: var(--green-mid); color: var(--text-dark); }

    /* ── Responsive ── */
    @media (max-width: 860px) {
      .cart-layout {
        grid-template-columns: 1fr;
      }

      .cart-summary-card {
        position: static;
        order: -1;
      }

      .cart-row {
        grid-template-columns: 56px 1fr;
        grid-template-rows: auto auto;
        gap: 10px 12px;
      }

      .cart-row-thumb {
        width: 56px;
        height: 56px;
        grid-row: 1 / 3;
      }

      .cart-row-total,
      .cart-row-remove {
        grid-column: 2;
      }

      .cart-row-controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        grid-column: 2;
      }

      .quote-form-grid {
        grid-template-columns: 1fr;
      }

      .quote-submit-row {
        flex-direction: column;
        align-items: stretch;
      }

      .quote-submit-btn {
        width: 100%;
        justify-content: center;
      }
    }

    @media (max-width: 480px) {
      .cart-page-heading {
        font-size: 21px;
      }

      .cart-success-page {
        padding: 48px 16px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="/js/data.js"></script>
  <script src="/js/state.js"></script>
  <script src="/js/components.js"></script>
  <script>
    injectStorefrontShell();

    /* ─── State ─── */
    let submitted = false;

    /* ─── Main render dispatcher ─── */
    function render() {
      const cart = NM.getCart();
      const main = document.getElementById('main-content');

      if (submitted) {
        renderSuccess(main);
      } else if (cart.length === 0) {
        renderEmpty(main);
      } else {
        renderCart(main, cart);
      }
    }

    /* ─── A) Cart has items ─── */
    function renderCart(main, cart) {
      const user = NM.getUser();
      const total = NM.cartTotal();
      const itemCount = NM.cartCount();

      main.innerHTML = `
        <section class="cart-page">
          <div class="container">
            <nav class="cart-breadcrumb" aria-label="Breadcrumb">
              <a href="/">Home</a>
              <span>/</span>
              <span class="current">Cart & Quote</span>
            </nav>
            <h1 class="cart-page-heading">Cart &amp; Quote Request</h1>
            <p class="cart-page-sub">${itemCount} item${itemCount !== 1 ? 's' : ''} ready for quote</p>

            <div class="cart-layout">

              <!-- Left: items -->
              <div>
                <div class="cart-items-card" id="cart-items-card">
                  <div class="cart-items-head">
                    <span class="cart-items-title">Your Items</span>
                    <span class="cart-count-pill" id="count-pill">${itemCount} item${itemCount !== 1 ? 's' : ''}</span>
                  </div>
                  <div id="cart-rows">
                    ${renderCartRows(cart)}
                  </div>
                </div>

                <!-- Quote form -->
                <div class="quote-form-section" id="quote-form-section">
                  <div class="quote-form-card">
                    <div class="quote-form-head">
                      <div class="quote-form-icon">📋</div>
                      <div class="quote-form-head-text">
                        <h2>Quote Details</h2>
                        <p>Tell us who this is for so we can apply the right pricing and tax treatment.</p>
                      </div>
                    </div>
                    <div class="quote-form-body">
                      <form id="quote-form" novalidate>

                        <!-- Buyer type chips -->
                        <div style="font-size:12.5px;font-weight:700;color:var(--text-dark);margin-bottom:8px">I'm buying as</div>
                        <div style="display:flex;gap:9px;flex-wrap:wrap;margin-bottom:20px" id="buyer-type-chips">
                          <button type="button" onclick="setBuyerChip('office')" class="buyer-chip active" id="chip-office">🏢 Office</button>
                          <button type="button" onclick="setBuyerChip('school')" class="buyer-chip" id="chip-school">🏫 School</button>
                          <button type="button" onclick="setBuyerChip('college')" class="buyer-chip" id="chip-college">🎓 College</button>
                          <button type="button" onclick="setBuyerChip('personal')" class="buyer-chip" id="chip-personal">👤 Personal</button>
                        </div>

                        <div class="quote-form-grid">
                          <div class="form-group" id="qf-org-row">
                            <label class="form-label" for="qf-org">Organisation name</label>
                            <input type="text" id="qf-org" class="form-control" placeholder="e.g. Bright Future School"
                              value="${user ? '' : ''}">
                          </div>
                          <div class="form-group" id="qf-gstin-row">
                            <label class="form-label" for="qf-gstin">GSTIN <span class="form-label-optional">(optional)</span></label>
                            <input type="text" id="qf-gstin" class="form-control" placeholder="29ABCDE1234F1Z5">
                          </div>
                          <div class="form-group">
                            <label class="form-label" for="qf-name">Contact person <span style="color:var(--red)">*</span></label>
                            <input type="text" id="qf-name" class="form-control" placeholder="Your full name"
                              value="${user ? escHtml(user.name) : ''}" required>
                          </div>
                          <div class="form-group">
                            <label class="form-label" for="qf-phone">Phone <span style="color:var(--red)">*</span></label>
                            <input type="tel" id="qf-phone" class="form-control" placeholder="+91 98765 43210"
                              value="${user ? escHtml(user.phone || '') : ''}" required>
                          </div>
                          <div class="form-group full-col">
                            <label class="form-label" for="qf-address">Delivery address <span style="color:var(--red)">*</span></label>
                            <input type="text" id="qf-address" class="form-control" placeholder="Building, street, area, city, PIN" required>
                          </div>
                          <div class="form-group">
                            <label class="form-label" for="qf-needed-by">Needed by</label>
                            <input type="date" id="qf-needed-by" class="form-control">
                          </div>
                          <div class="form-group">
                            <label class="form-label" for="qf-payment">Payment terms</label>
                            <select id="qf-payment" class="form-control">
                              <option>Pay on delivery</option>
                              <option>Advance payment</option>
                              <option>Net 15 (registered firms)</option>
                              <option>Net 30 (registered firms)</option>
                            </select>
                          </div>
                          <div class="form-group full-col">
                            <label class="form-label" for="qf-note">Notes for our team <span class="form-label-optional">(optional)</span></label>
                            <textarea id="qf-note" class="form-control" placeholder="Any specific brands, deadlines, or budget targets? Let us know and we'll factor it into your quote." rows="3"></textarea>
                          </div>
                        </div>

                        <div class="quote-submit-row">
                          <p class="quote-submit-info">
                            Free · no obligation · official PDF quote sent to you via Email &amp; WhatsApp.
                          </p>
                          <button type="submit" class="quote-submit-btn" id="quote-submit-btn">
                            📋 Request Quote →
                          </button>
                        </div>
                      </form>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Right: summary -->
              <div>
                <div class="cart-summary-card">
                  <div class="cart-summary-head" style="padding-bottom:4px">
                    <div class="cart-summary-head-label" style="font-family:var(--font-heading);font-size:16px;font-weight:700;color:var(--text-dark)">Estimated Summary</div>
                  </div>
                  <div class="cart-summary-body">
                    <div class="cart-summary-row">
                      <span>Subtotal (${itemCount} items)</span>
                      <strong id="summary-subtotal" style="color:var(--text-dark)">${NM.fmt(total)}</strong>
                    </div>
                    ${total >= 5000 ? `<div class="cart-summary-row"><span style="color:var(--green-dark);font-weight:600">Est. bulk discount</span><strong style="color:var(--green-dark)">−${NM.fmt(Math.round(total * 0.08))}</strong></div>` : ''}
                    <div class="cart-summary-row">
                      <span>Delivery</span>
                      <strong style="color:${total >= 999 ? 'var(--green-dark)' : 'var(--text-muted)'};">${total >= 999 ? 'Free' : NM.fmt(50)}</strong>
                    </div>
                    <div class="cart-summary-row">
                      <span>GST (18%)</span>
                      <strong style="color:var(--text-muted);font-weight:400">On final quote</strong>
                    </div>
                    <div class="cart-summary-divider"></div>
                    <div class="cart-summary-row" style="font-size:18px;font-weight:800;margin-bottom:4px">
                      <span style="font-family:var(--font-heading);color:var(--text-dark)">Est. Total</span>
                      <strong id="summary-total" style="color:var(--green-dark)">${NM.fmt(total)}</strong>
                    </div>
                    <div class="cart-summary-notice">
                      This is an estimate. Your final quote may include extra bulk discounts and is confirmed by our team.
                    </div>

                    ${user ? `
                    <button class="quote-cta-btn" id="summary-quote-btn" style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px">
                      📋 Request Quote
                    </button>
                    <div style="font-size:11px;color:var(--text-muted);text-align:center;margin-top:8px;line-height:1.5">Free · no obligation · official PDF quote sent to you</div>
                    ` : `
                    <div style="background:var(--green-light);border:1px solid #d4eee2;border-radius:12px;padding:14px;text-align:center">
                      <div style="font-size:13px;color:var(--text-dark);font-weight:700;margin-bottom:3px">Log in to request a quote</div>
                      <div style="font-size:12px;color:var(--text-muted);margin-bottom:11px;line-height:1.5">Quotes &amp; orders are tied to your account so you can track and approve them.</div>
                      <div style="display:flex;gap:8px">
                        <a href="/login.html" class="btn btn-primary" style="flex:1;justify-content:center;font-size:12.5px;padding:10px">Log In</a>
                        <a href="/login.html" class="btn btn-outline" style="flex:1;justify-content:center;font-size:12.5px;padding:10px">Register</a>
                      </div>
                    </div>
                    `}

                    <div style="display:flex;flex-direction:column;gap:9px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border-light)">
                      <div style="display:flex;gap:9px;align-items:center;font-size:12px;color:var(--text-muted)"><span>🧾</span> GST invoice for registered firms</div>
                      <div style="display:flex;gap:9px;align-items:center;font-size:12px;color:var(--text-muted)"><span>🚚</span> Free delivery over ₹999</div>
                      <div style="display:flex;gap:9px;align-items:center;font-size:12px;color:var(--text-muted)"><span>🔒</span> Your details are kept private</div>
                    </div>

                    <a href="https://wa.me/919848066608?text=${encodeURIComponent('Hi Padmavathi Traders, I would like to get a quote for my order.')}"
                      class="cart-summary-whatsapp" target="_blank" rel="noopener">
                      💬 Enquire on WhatsApp
                    </a>
                  </div>
                </div>
              </div>

            </div>
          </div>
        </section>
      `;

      /* Scroll-to-form from summary button */
      document.getElementById('summary-quote-btn').addEventListener('click', () => {
        const formSection = document.getElementById('quote-form-section');
        if (formSection) {
          formSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
          setTimeout(() => {
            const firstInput = formSection.querySelector('input');
            if (firstInput) firstInput.focus();
          }, 400);
        }
      });

      /* Form submission */
      document.getElementById('quote-form').addEventListener('submit', handleSubmit);
    }

    /* ─── Cart rows HTML ─── */
    function renderCartRows(cart) {
      return cart.map(item => {
        const prod = NM_DATA.products.find(p => p.id === item.id) || {};
        const imgSrc = item.img || prod.img || '';
        const bulkHint = item.qty >= 50 ? '🎉 Bulk discount applied' : item.qty >= 20 ? '📦 Qualifies for bulk quote' : '';
        return `
          <div class="cart-row" id="row-${item.id}">
            <div class="cart-row-thumb" style="overflow:hidden;background:#f5f5f5">
              ${imgSrc ? `<img src="${escHtml(imgSrc)}" alt="" style="width:100%;height:100%;object-fit:cover;display:block;">` : '<span style="font-size:28px;display:flex;align-items:center;justify-content:center;height:100%">📦</span>'}
            </div>
            <div class="cart-row-info">
              <div class="cart-row-name" title="${escHtml(item.name)}">${escHtml(item.name)}</div>
              <div class="cart-row-unit">${NM.fmt(item.price)} per unit${bulkHint ? ' · <span style="color:var(--green-dark);font-weight:700">' + bulkHint + '</span>' : ''}</div>
            </div>
            <div class="cart-qty-stepper">
              <button onclick="changeQty(${item.id}, ${item.qty - 1})" aria-label="Decrease quantity">−</button>
              <span>${item.qty}</span>
              <button onclick="changeQty(${item.id}, ${item.qty + 1})" aria-label="Increase quantity">+</button>
            </div>
            <div class="cart-row-total">${NM.fmt(item.price * item.qty)}</div>
            <button class="cart-row-remove" onclick="removeItem(${item.id})" aria-label="Remove ${escHtml(item.name)}">✕</button>
          </div>
        `;
      }).join('');
    }

    /* ─── Live qty change (no full re-render) ─── */
    function changeQty(id, newQty) {
      NM.updateCartQty(id, newQty);
      const cart = NM.getCart();

      if (cart.length === 0) {
        render();
        return;
      }

      /* Refresh rows */
      const rowsEl = document.getElementById('cart-rows');
      if (rowsEl) rowsEl.innerHTML = renderCartRows(cart);

      /* Refresh totals */
      const total = NM.cartTotal();
      const count = NM.cartCount();

      const summaryTotal = document.getElementById('summary-total');
      const summarySubtotal = document.getElementById('summary-subtotal');
      const summaryCount = document.getElementById('summary-item-count');
      const countPill = document.getElementById('count-pill');
      const pageSubEl = document.querySelector('.cart-page-sub');

      if (summaryTotal) summaryTotal.textContent = NM.fmt(total);
      if (summarySubtotal) summarySubtotal.textContent = NM.fmt(total);
      if (summaryCount) summaryCount.textContent = count;
      if (countPill) countPill.textContent = count + ' item' + (count !== 1 ? 's' : '');
      if (pageSubEl) pageSubEl.textContent = count + ' item' + (count !== 1 ? 's' : '') + ' ready for quote';
    }

    /* ─── Remove item ─── */
    function removeItem(id) {
      NM.removeFromCart(id);
      const cart = NM.getCart();
      if (cart.length === 0) {
        render();
        return;
      }
      changeQty(id, 0); /* qty 0 already removed it, just refresh display */
      const rowsEl = document.getElementById('cart-rows');
      if (rowsEl) rowsEl.innerHTML = renderCartRows(NM.getCart());
      const total = NM.cartTotal();
      const count = NM.cartCount();
      const summaryTotal = document.getElementById('summary-total');
      const summarySubtotal = document.getElementById('summary-subtotal');
      const summaryCount = document.getElementById('summary-item-count');
      const countPill = document.getElementById('count-pill');
      const pageSubEl = document.querySelector('.cart-page-sub');
      if (summaryTotal) summaryTotal.textContent = NM.fmt(total);
      if (summarySubtotal) summarySubtotal.textContent = NM.fmt(total);
      if (summaryCount) summaryCount.textContent = count;
      if (countPill) countPill.textContent = count + ' item' + (count !== 1 ? 's' : '');
      if (pageSubEl) pageSubEl.textContent = count + ' item' + (count !== 1 ? 's' : '') + ' ready for quote';
      showToast('Item removed from cart', 'info');
    }

    /* ─── Buyer type chip logic ─── */
    let _buyerChip = 'office';
    window.setBuyerChip = function(type) {
      _buyerChip = type;
      ['office','school','college','personal'].forEach(t => {
        const el = document.getElementById('chip-' + t);
        if (el) el.classList.toggle('active', t === type);
      });
      // hide org/GSTIN for personal
      const orgRow = document.getElementById('qf-org-row');
      const gstRow = document.getElementById('qf-gstin-row');
      const isPersonal = type === 'personal';
      if (orgRow) orgRow.style.display = isPersonal ? 'none' : '';
      if (gstRow) gstRow.style.display = isPersonal ? 'none' : '';
    };

    /* ─── Form submission ─── */
    function handleSubmit(e) {
      e.preventDefault();

      const name    = document.getElementById('qf-name').value.trim();
      const phone   = document.getElementById('qf-phone').value.trim();
      const address = document.getElementById('qf-address').value.trim();

      if (!name)    { shakeField('qf-name',    'Contact person name is required'); return; }
      if (!phone)   { shakeField('qf-phone',   'Phone number is required'); return; }
      if (!address) { shakeField('qf-address', 'Delivery address is required'); return; }

      const btn = document.getElementById('quote-submit-btn');
      btn.textContent = 'Submitting…';
      btn.disabled = true;
      btn.style.opacity = '.7';

      /* Simulate network delay */
      setTimeout(() => {
        NM.clearCart();
        submitted = true;
        render();
      }, 900);
    }

    function shakeField(id, msg) {
      const el = document.getElementById(id);
      if (!el) return;
      el.style.borderColor = 'var(--red)';
      el.style.boxShadow = '0 0 0 3px rgba(239,68,68,.13)';
      el.focus();
      showToast(msg, 'error');
      el.addEventListener('input', () => {
        el.style.borderColor = '';
        el.style.boxShadow = '';
      }, { once: true });
    }

    /* ─── B) Empty state ─── */
    function renderEmpty(main) {
      main.innerHTML = `
        <section class="cart-page">
          <div class="container">
            <nav class="cart-breadcrumb" aria-label="Breadcrumb">
              <a href="/">Home</a>
              <span>/</span>
              <span class="current">Cart</span>
            </nav>
            <div class="cart-empty-page">
              <span class="cart-empty-page-icon">🛒</span>
              <h2>Your cart is empty</h2>
              <p>Add some stationery, notebooks, pens or art supplies to get started with your quote request.</p>
              <div class="cart-empty-actions">
                <a href="/shop.html" class="btn btn-primary btn-lg">Browse Products</a>
                <a href="/offers.html" class="btn btn-outline btn-lg">View Deals</a>
              </div>
            </div>
          </div>
        </section>
      `;
    }

    /* ─── C) Success state ─── */
    function renderSuccess(main) {
      /* Generate a quote reference number */
      const refNum = 'QT-' + (2041 + Math.floor(Math.random() * 10));

      main.innerHTML = `
        <section class="cart-page">
          <div class="container">
            <div class="cart-success-page">
              <div class="cart-success-check" role="img" aria-label="Success">✅</div>
              <h2>Quote request submitted!</h2>
              <p>
                Your request <strong style="color:var(--green-dark)">${refNum}</strong> is with our team. We'll prepare tiered pricing and a GST invoice, then send your official quote via <strong>Email &amp; WhatsApp</strong> — usually within 1 business day.
              </p>

              <!-- 3-step circles -->
              <div style="display:flex;gap:24px;margin:26px 0 28px;flex-wrap:wrap;justify-content:center">
                <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
                  <div style="width:42px;height:42px;border-radius:50%;background:var(--green-dark);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px">1</div>
                  <div style="font-size:12px;color:var(--text-muted);font-weight:600;text-align:center">Request<br>received</div>
                </div>
                <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
                  <div style="width:42px;height:42px;border-radius:50%;background:#fff;border:2px solid var(--border);color:#94A3B8;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px">2</div>
                  <div style="font-size:12px;color:#94A3B8;font-weight:600;text-align:center">We prepare<br>your quote</div>
                </div>
                <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
                  <div style="width:42px;height:42px;border-radius:50%;background:#fff;border:2px solid var(--border);color:#94A3B8;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px">3</div>
                  <div style="font-size:12px;color:#94A3B8;font-weight:600;text-align:center">Approve &amp;<br>order</div>
                </div>
              </div>

              <div class="cart-success-actions">
                <a href="/shop" class="btn btn-primary btn-lg">Continue Shopping →</a>
                <a href="/shop.html" class="btn btn-outline btn-lg">Continue Shopping</a>
              </div>
            </div>
          </div>
        </section>
      `;
    }

    /* ─── Utility ─── */
    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    /* ─── Seed cart with mockup items if empty ─── */
    (function seedCart() {
      if (NM.getCart().length > 0) return;
      const seedItems = [
        { id: 3,  name: 'Faber-Castell Colour Pencils (48)', qty: 60 },
        { id: 10, name: 'Pilot Highlighters (5 Pack)',       qty: 15 },
        { id: 4,  name: 'Camlin Watercolour Kit',            qty: 40 },
        { id: 15, name: 'Classmate A4 Notepad Pack',         qty: 20 }
      ];
      seedItems.forEach(s => {
        const p = NM_DATA.products.find(x => x.id === s.id);
        if (!p) return;
        NM.addToCart({ id: p.id, name: s.name, price: p.sale || p.price, img: p.img }, s.qty);
      });
    })();

    /* ─── Init ─── */
    render();

    /* Re-render if cart changes externally (e.g. from drawer) */
    document.addEventListener('nm:cartchange', () => {
      if (!submitted) render();
    });
  </script>
</body>
</html>
