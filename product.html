<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Detail — Padmavathi Traders</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* ── Page-level layout ── */
    .product-page { padding: 0 0 64px; }

    .breadcrumb {
      padding: 14px 0;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
      flex-wrap: wrap;
    }
    .breadcrumb a { color: var(--text-muted); transition: color .15s; }
    .breadcrumb a:hover { color: var(--green-dark); }
    .breadcrumb-sep { color: var(--border); font-size: 11px; }
    .breadcrumb-current { color: var(--text-dark); font-weight: 500; }

    /* ── Two-column product layout ── */
    .product-layout {
      display: grid;
      grid-template-columns: 55fr 45fr;
      gap: 40px;
      align-items: start;
    }

    /* ── Image column ── */
    .product-images { }

    .product-main-image {
      aspect-ratio: 1;
      border-radius: 14px;
      border: 1.5px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 120px;
      position: relative;
      overflow: hidden;
      cursor: zoom-in;
      transition: box-shadow .2s;
      background: linear-gradient(135deg, #f0fdf7, #d1fae5);
    }
    .product-main-image:hover { box-shadow: var(--shadow-md); }

    .product-main-image .main-emoji {
      font-size: 110px;
      line-height: 1;
      position: relative;
      z-index: 1;
      transition: transform .25s cubic-bezier(.34,1.56,.64,1);
      user-select: none;
    }
    .product-main-image:hover .main-emoji { transform: scale(1.08); }

    /* gradient overlay pattern — subtle grid lines */
    .product-main-image::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(59,183,126,.06) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(59,183,126,.06) 40px);
      pointer-events: none;
    }

    /* corner accent */
    .product-main-image::after {
      content: '';
      position: absolute;
      bottom: -30px;
      right: -30px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: rgba(59,183,126,.10);
      pointer-events: none;
    }

    .product-thumbnails {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .product-thumb {
      flex: 1;
      aspect-ratio: 1;
      border-radius: 10px;
      border: 2px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
      position: relative;
      overflow: hidden;
    }
    .product-thumb:hover { border-color: var(--green-mid); }
    .product-thumb.active {
      border-color: var(--green-mid);
      box-shadow: 0 0 0 3px rgba(59,183,126,.18);
    }
    .product-thumb::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .product-thumb:nth-child(1) { background: linear-gradient(135deg, #f0fdf7, #d1fae5); }
    .product-thumb:nth-child(2) { background: linear-gradient(135deg, #eff6ff, #dbeafe); }
    .product-thumb:nth-child(3) { background: linear-gradient(135deg, #faf5ff, #ede9fe); }

    .thumb-label {
      position: absolute;
      bottom: 5px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .4px;
      color: var(--text-muted);
    }

    /* thumbnail gradients for main display */
    .gradient-1 { background: linear-gradient(135deg, #f0fdf7, #d1fae5) !important; }
    .gradient-2 { background: linear-gradient(135deg, #eff6ff, #dbeafe) !important; }
    .gradient-3 { background: linear-gradient(135deg, #faf5ff, #ede9fe) !important; }

    /* ── Info column ── */
    .product-info { padding-top: 4px; }

    .product-category-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--green-light);
      color: var(--green-dark);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 12px;
    }

    .product-name {
      font-family: var(--font-heading);
      font-size: 26px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
      text-wrap: balance;
      margin-bottom: 6px;
    }

    .product-brand {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    .product-brand strong { color: var(--text-base); }

    .product-price-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 12px;
    }
    .product-price-main {
      font-family: var(--font-heading);
      font-size: 32px;
      font-weight: 700;
      color: var(--green-dark);
      font-variant-numeric: tabular-nums;
    }
    .product-price-original {
      font-size: 16px;
      color: var(--text-muted);
      text-decoration: line-through;
      font-variant-numeric: tabular-nums;
    }
    .product-save-badge {
      background: #fef3c7;
      color: #92400e;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
    }

    .product-stock-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border-light);
    }
    .stock-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .stock-dot.in { background: var(--green-mid); box-shadow: 0 0 0 3px rgba(59,183,126,.22); }
    .stock-dot.out { background: var(--red); }
    .stock-text { font-size: 13px; font-weight: 600; }
    .stock-text.in { color: var(--green-dark); }
    .stock-text.out { color: var(--red); }

    .product-short-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 22px;
    }

    /* ── Quantity + actions ── */
    .product-qty-label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-dark);
      margin-bottom: 8px;
    }

    .product-qty-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .qty-control {
      display: flex;
      align-items: center;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-btn);
      overflow: hidden;
    }
    .qty-control button {
      width: 40px;
      height: 44px;
      background: var(--bg-hover);
      border: none;
      font-size: 20px;
      color: var(--text-dark);
      cursor: pointer;
      transition: background .15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .qty-control button:hover { background: var(--green-light); color: var(--green-dark); }
    .qty-control button:disabled { opacity: .35; cursor: not-allowed; }
    .qty-control input {
      width: 60px;
      height: 44px;
      border: none;
      border-left: 1.5px solid var(--border);
      border-right: 1.5px solid var(--border);
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      color: var(--text-dark);
      outline: none;
      font-family: var(--font-body);
      background: #fff;
    }
    /* hide number input arrows */
    .qty-control input::-webkit-outer-spin-button,
    .qty-control input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .qty-control input[type=number] { -moz-appearance: textfield; }

    .product-actions {
      display: flex;
      gap: 10px;
      flex-direction: column;
    }

    .btn-add-cart {
      background: var(--green-mid);
      color: #fff;
      border: none;
      border-radius: var(--radius-btn);
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 700;
      font-family: var(--font-body);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background .18s, transform .12s;
      width: 100%;
    }
    .btn-add-cart:hover { background: var(--green-dark); }
    .btn-add-cart:active { transform: scale(.98); }
    .btn-add-cart:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }

    .btn-wishlist {
      background: #fff;
      color: var(--green-dark);
      border: 1.5px solid var(--green-dark);
      border-radius: var(--radius-btn);
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font-body);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all .18s;
      width: 100%;
    }
    .btn-wishlist:hover { background: var(--green-light); }
    .btn-wishlist.wishlisted {
      background: #fee2e2;
      border-color: #ef4444;
      color: #dc2626;
    }
    .btn-wishlist.wishlisted:hover { background: #fecaca; }

    .product-meta-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 20px;
      padding-top: 18px;
      border-top: 1px solid var(--border-light);
    }
    .meta-tag {
      font-size: 12px;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 20px;
      transition: all .15s;
    }
    .meta-tag:hover { border-color: var(--green-mid); color: var(--green-dark); cursor: pointer; }

    /* ── Tabs section ── */
    .product-tabs-section {
      margin-top: 48px;
    }

    .product-tabs-nav {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--border);
      margin-bottom: 28px;
    }
    .product-tab-btn {
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      border: none;
      border-bottom: 2.5px solid transparent;
      margin-bottom: -2px;
      cursor: pointer;
      background: none;
      font-family: var(--font-body);
      transition: all .15s;
      white-space: nowrap;
    }
    .product-tab-btn.active { color: var(--green-dark); border-bottom-color: var(--green-mid); }
    .product-tab-btn:hover:not(.active) { color: var(--text-dark); }

    .product-tab-panel { display: none; }
    .product-tab-panel.active { display: block; }

    /* description tab */
    .tab-desc p {
      font-size: 15px;
      line-height: 1.8;
      color: var(--text-base);
      margin-bottom: 16px;
    }
    .tab-desc p:last-child { margin-bottom: 0; }

    /* specs tab */
    .specs-table { width: 100%; border-collapse: collapse; }
    .specs-table tr { border-bottom: 1px solid var(--border-light); }
    .specs-table tr:last-child { border-bottom: none; }
    .specs-table td {
      padding: 13px 0;
      font-size: 14px;
      vertical-align: top;
    }
    .specs-table td:first-child {
      width: 180px;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .3px;
      padding-right: 24px;
    }
    .specs-table td:last-child { color: var(--text-dark); }

    /* reviews tab */
    .reviews-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .review-card {
      background: var(--bg-page);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-card);
      padding: 20px;
    }
    .review-header {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 12px;
    }
    .review-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--green-mid);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .review-meta { flex: 1; }
    .review-name { font-size: 14px; font-weight: 700; color: var(--text-dark); }
    .review-date { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
    .review-stars {
      color: #f59e0b;
      font-size: 15px;
      letter-spacing: 1px;
    }
    .review-text {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-base);
    }
    .review-tag {
      display: inline-block;
      margin-top: 10px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .4px;
      color: var(--green-dark);
      background: var(--green-light);
      padding: 2px 9px;
      border-radius: 20px;
    }

    /* ── Related products ── */
    .related-section { margin-top: 56px; }
    .related-heading {
      font-family: var(--font-heading);
      font-size: 22px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 20px;
    }
    .related-scroll-wrap { overflow-x: auto; padding-bottom: 8px; }
    .related-scroll-wrap::-webkit-scrollbar { height: 4px; }
    .related-scroll-wrap::-webkit-scrollbar-track { background: var(--border-light); border-radius: 2px; }
    .related-scroll-wrap::-webkit-scrollbar-thumb { background: var(--green-mid); border-radius: 2px; }
    .related-products {
      display: flex;
      gap: 16px;
      width: max-content;
    }
    .related-products .product-card {
      width: 200px;
      flex-shrink: 0;
    }
    .related-products .product-card-img { aspect-ratio: 1; }

    /* ── Responsive ── */
    @media (max-width: 860px) {
      .product-layout {
        grid-template-columns: 1fr;
        gap: 28px;
      }
      .product-name { font-size: 22px; }
      .product-price-main { font-size: 26px; }
    }
    @media (max-width: 600px) {
      .product-thumbnails { gap: 8px; }
      .product-tab-btn { padding: 10px 14px; font-size: 13px; }
      .related-products .product-card { width: 170px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="/js/data.js"></script>
  <script src="/js/state.js"></script>
  <script src="/js/components.js"></script>
  <script>
    injectStorefrontShell();

    (function() {
      /* ── Resolve product ── */
      const params = new URLSearchParams(window.location.search);
      const rawId = parseInt(params.get('id'), 10);
      const products = window.NM_DATA.products;
      let product = products.find(p => p.id === rawId) || products[0];

      /* ── Update page title ── */
      document.title = product.name + ' — Padmavathi Traders';

      /* ── Related products (same category, excluding current) ── */
      const related = products
        .filter(p => p.category === product.category && p.id !== product.id)
        .slice(0, 6);
      // if fewer than 6, pad with products from other categories
      if (related.length < 6) {
        const others = products.filter(p => p.id !== product.id && !related.find(r => r.id === p.id));
        related.push(...others.slice(0, 6 - related.length));
      }

      /* ── Discount calc ── */
      function discountPct(price, original) {
        if (!original || original <= price) return 0;
        return Math.round((original - price) / original * 100);
      }

      /* ── Gallery images ── */
      const galleryImgs = [product.img].concat(
        related.filter(r => r.img !== product.img).map(r => r.img).slice(0, 3)
      );
      let activeThumb = 0;

      /* ── Variants (for Faber-Castell pencils product, otherwise single) ── */
      const VARIANTS = product.id === 3 ? [
        { label:'12 Pencils', price:175, mrp:210, sku:'FC-CP-12' },
        { label:'24 Pencils', price:270, mrp:320, sku:'FC-CP-24' },
        { label:'48 Pencils', price:499, mrp:620, sku:'FC-CP-48' }
      ] : null;
      let activeVariant = VARIANTS ? 1 : null;

      function getEffectivePrice() {
        if (VARIANTS) return VARIANTS[activeVariant].price;
        return product.sale || product.price;
      }
      function getEffectiveMRP() {
        if (VARIANTS) return VARIANTS[activeVariant].mrp;
        return product.sale ? product.price : null;
      }

      /* ── Render ── */
      const main = document.getElementById('main-content');
      const catSlug = window.NM_DATA.categories.find(c => c.name === product.category)?.slug || '';
      const salePrice = product.sale || product.price;
      const mrp = product.sale ? product.price : null;
      const disc = mrp ? Math.round((mrp - salePrice) / mrp * 100) : 0;

      main.innerHTML = `
        <div class="product-page">
          <div class="container">

            <!-- Breadcrumb -->
            <nav class="breadcrumb" aria-label="Breadcrumb">
              <a href="/">Home</a>
              <span class="breadcrumb-sep">›</span>
              <a href="/shop">Shop</a>
              <span class="breadcrumb-sep">›</span>
              <a href="/shop?cat=${catSlug}">${product.category}</a>
              <span class="breadcrumb-sep">›</span>
              <span class="breadcrumb-current">${product.name}</span>
            </nav>

            <!-- Product layout -->
            <div class="product-layout">

              <!-- Left: Images -->
              <div class="product-images">
                <div class="product-main-image" id="main-img-area" style="background:#f5f7f2;overflow:hidden;position:relative;">
                  <img id="main-img" src="${galleryImgs[0]}" alt="${product.name}" style="width:100%;height:100%;object-fit:cover;display:block;">
                  ${product.badge ? `<span style="position:absolute;top:12px;left:12px;background:${product.badge.c};color:#fff;font-size:12px;font-weight:800;padding:4px 10px;border-radius:8px;line-height:1;letter-spacing:.3px;z-index:2">${product.badge.l}</span>` : ''}
                </div>
                <div class="product-thumbnails">
                  ${galleryImgs.map((imgUrl, i) => `
                    <div class="product-thumb ${i === 0 ? 'active' : ''}" data-idx="${i}" data-src="${imgUrl}" role="button" tabindex="0" aria-label="View image ${i+1}" style="overflow:hidden;background:#f5f5f5;">
                      <img src="${imgUrl}" alt="" style="width:100%;height:100%;object-fit:cover;display:block;">
                    </div>
                  `).join('')}
                </div>
              </div>

              <!-- Right: Info -->
              <div class="product-info">
                <div class="product-category-badge">${product.category} · ${product.brand}</div>

                <h1 class="product-name">${product.id === 3 ? 'Faber-Castell Premium Colour Pencils' : product.name}</h1>

                ${product.rating ? `
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
                  <span style="color:#F59E0B;font-size:16px">${'★'.repeat(Math.floor(product.rating))}</span>
                  <span style="font-size:14px;font-weight:600;color:var(--text-dark)">${product.rating}</span>
                  <span style="font-size:13px;color:var(--text-muted)">(${product.reviews} reviews)</span>
                  <span style="font-size:12px;color:var(--green-dark);font-weight:600">● In Stock</span>
                </div>` : ''}

                <!-- Variants -->
                ${VARIANTS ? `
                <div style="margin-bottom:16px">
                  <div style="font-size:13px;font-weight:600;color:var(--text-dark);margin-bottom:8px">Pack Size</div>
                  <div style="display:flex;gap:8px;flex-wrap:wrap" id="variant-btns">
                    ${VARIANTS.map((v, i) => `
                      <button onclick="selectVariant(${i})" id="var-btn-${i}"
                        style="padding:8px 16px;border-radius:8px;border:2px solid ${i === activeVariant ? 'var(--green-dark)' : 'var(--border)'};background:${i === activeVariant ? 'var(--green-light)' : '#fff'};color:${i === activeVariant ? 'var(--green-dark)' : 'var(--text-dark)'};font-weight:600;font-size:13px;cursor:pointer;transition:all .15s">
                        ${v.label}
                      </button>
                    `).join('')}
                  </div>
                </div>` : ''}

                <!-- Price -->
                <div class="product-price-row" id="price-row">
                  <span class="product-price-main" id="price-main">${NM.fmt(VARIANTS ? VARIANTS[activeVariant].price : salePrice)}</span>
                  <span class="product-price-original" id="price-mrp" style="${(VARIANTS ? VARIANTS[activeVariant].mrp : mrp) ? '' : 'display:none'}">${NM.fmt(VARIANTS ? VARIANTS[activeVariant].mrp : mrp)}</span>
                  ${disc > 0 || VARIANTS ? `<span class="product-save-badge" id="save-badge">${VARIANTS ? 'Save ' + NM.fmt(VARIANTS[activeVariant].mrp - VARIANTS[activeVariant].price) : disc + '% off'}</span>` : ''}
                </div>
                <p style="font-size:12px;color:var(--text-muted);margin-bottom:16px">Inclusive of all taxes · GST invoice available</p>

                <!-- Short desc -->
                <p class="product-short-desc">${product.desc}</p>

                <!-- Quantity -->
                <div class="product-qty-label">Quantity</div>
                <div class="product-qty-row">
                  <div class="qty-control">
                    <button id="qty-dec" aria-label="Decrease quantity">−</button>
                    <input type="number" id="qty-input" value="1" min="1" max="999" aria-label="Quantity">
                    <button id="qty-inc" aria-label="Increase quantity">+</button>
                  </div>
                </div>

                <!-- Actions -->
                <div class="product-actions">
                  <button class="btn-add-cart" id="btn-add-cart" ${!product.inStock ? 'disabled' : ''}>
                    🛒 Add to Cart · <span id="line-total">${NM.fmt(VARIANTS ? VARIANTS[activeVariant].price : salePrice)}</span>
                  </button>
                  <button class="btn-wishlist" id="btn-wishlist">
                    <svg id="wl-heart" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                    <span id="wl-label">Add to Wishlist</span>
                  </button>
                </div>

                <!-- Bulk callout -->
                <div style="background:var(--green-light);border:1px solid #cdeede;border-radius:10px;padding:14px 16px;margin-top:16px;display:flex;align-items:flex-start;gap:12px">
                  <span style="font-size:22px">📋</span>
                  <div>
                    <div style="font-weight:700;font-size:14px;color:var(--green-dark);margin-bottom:2px">Ordering in bulk for an office or school?</div>
                    <div style="font-size:13px;color:var(--text-muted)">Add to cart and request a custom quote — we'll send tiered pricing &amp; a GST invoice.</div>
                    <a href="/cart.html" style="display:inline-block;margin-top:8px;font-size:13px;font-weight:600;color:var(--green-dark)">Get Quote →</a>
                  </div>
                </div>

                <!-- Delivery facts -->
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px">
                  <div style="font-size:12px;color:var(--text-muted)">🚚 Free over ₹999 · 2–4 days</div>
                  <div style="font-size:12px;color:var(--text-muted)">↩️ 7-day returns</div>
                  <div style="font-size:12px;color:var(--text-muted)">🧾 GST invoice available</div>
                  <div style="font-size:12px;color:var(--text-muted)">✅ 100% genuine product</div>
                </div>
              </div>
            </div>

            <!-- Tabs -->
            <div class="product-tabs-section">
              <div class="product-tabs-nav" role="tablist">
                <button class="product-tab-btn active" role="tab" aria-selected="true" data-tab="desc">Description</button>
                <button class="product-tab-btn" role="tab" aria-selected="false" data-tab="specs">Specifications</button>
                <button class="product-tab-btn" role="tab" aria-selected="false" data-tab="reviews">Reviews <span style="font-size:12px;color:var(--text-muted);font-weight:400">(${product.reviews || 2})</span></button>
              </div>

              <!-- Description -->
              <div class="product-tab-panel active tab-desc" id="tab-desc" role="tabpanel">
                <p>${product.id === 3
                  ? 'Smooth, break-resistant leads in richly pigmented, blendable shades. Encased in sustainably-sourced wood with the Faber-Castell SV bonding that keeps the lead from breaking — a studio favourite for students and professional artists alike.'
                  : `The ${product.name} from ${product.brand} is crafted for everyday excellence. ${product.desc}`
                }</p>
                ${product.id === 3 ? `
                <ul style="margin-top:14px;padding-left:20px;display:flex;flex-direction:column;gap:6px">
                  <li style="font-size:14px">Secural (SV) bonding fuses lead to wood — far fewer breakages</li>
                  <li style="font-size:14px">Soft, highly-pigmented leads that layer and blend smoothly</li>
                  <li style="font-size:14px">Sustainably-sourced, FSC-certified wood casing</li>
                  <li style="font-size:14px">Pre-sharpened and ready to use out of the tin</li>
                  <li style="font-size:14px">Bright, lightfast colours that resist fading over time</li>
                </ul>` : ''}
              </div>

              <!-- Specifications -->
              <div class="product-tab-panel" id="tab-specs" role="tabpanel">
                <div class="table-wrap">
                  <table class="specs-table">
                    <tbody>
                      <tr><td>Brand</td><td>${product.brand}</td></tr>
                      <tr><td>Category</td><td>${product.category}</td></tr>
                      ${product.id === 3 ? `
                      <tr><td>Lead Type</td><td>Soft, water-resistant</td></tr>
                      <tr><td>Casing</td><td>FSC-certified wood</td></tr>
                      <tr><td>Tip</td><td>Pre-sharpened, 3.3 mm core</td></tr>
                      <tr><td>Country of Origin</td><td>Germany</td></tr>
                      <tr><td>Warranty</td><td>Manufacturer defect replacement</td></tr>
                      <tr><td>GST</td><td>18% (HSN 9609)</td></tr>
                      ` : `
                      <tr><td>Availability</td><td><span class="badge badge-green">In Stock</span></td></tr>
                      <tr><td>Country of Origin</td><td>India</td></tr>
                      <tr><td>GST Rate</td><td>18%</td></tr>
                      `}
                    </tbody>
                  </table>
                </div>
              </div>

              <!-- Reviews -->
              <div class="product-tab-panel" id="tab-reviews" role="tabpanel">
                <div style="margin-bottom:20px">
                  <div style="font-size:48px;font-weight:700;color:var(--text-dark);font-family:var(--font-heading)">${product.rating || '4.8'}</div>
                  <div style="color:#F59E0B;font-size:20px;margin-bottom:4px">${'★'.repeat(Math.floor(product.rating || 4.8))}</div>
                  <div style="font-size:13px;color:var(--text-muted)">Based on ${product.reviews || 567} reviews</div>
                </div>
                <div class="reviews-grid">
                  <div class="review-card">
                    <div class="review-header">
                      <div class="review-avatar" style="background:#3BB77E">AR</div>
                      <div class="review-meta">
                        <div class="review-name">Ananya Rao</div>
                        <div class="review-stars">★★★★★</div>
                        <div class="review-date">12 May 2026</div>
                      </div>
                    </div>
                    <p class="review-text">The pigment is gorgeous and they blend like butter. Bought the 48 set for my design students and not a single broken lead in the lot.</p>
                    <span class="review-tag">Verified Purchase</span>
                  </div>
                  <div class="review-card">
                    <div class="review-header">
                      <div class="review-avatar" style="background:#1f6b4d">VD</div>
                      <div class="review-meta">
                        <div class="review-name">Vikram Desai</div>
                        <div class="review-stars">★★★★★</div>
                        <div class="review-date">28 Apr 2026</div>
                      </div>
                    </div>
                    <p class="review-text">Ordered in bulk for our school art department. The quote process was quick and the GST invoice made accounting painless. Will reorder.</p>
                    <span class="review-tag">Verified Purchase</span>
                  </div>
                  <div class="review-card">
                    <div class="review-header">
                      <div class="review-avatar" style="background:#F59E0B">MS</div>
                      <div class="review-meta">
                        <div class="review-name">Meera S.</div>
                        <div class="review-stars">★★★★<span style="color:var(--border)">★</span></div>
                        <div class="review-date">9 Apr 2026</div>
                      </div>
                    </div>
                    <p class="review-text">Lovely colours and smooth application. Knocked one star only because I wished the tin had a built-in sharpener.</p>
                    <span class="review-tag"></span>
                  </div>
                </div>
              </div>
            </div>

            <!-- Related Products -->
            <div class="related-section">
              <h2 class="related-heading">You may also like</h2>
              <div class="related-scroll-wrap">
                <div class="related-products" id="related-products"></div>
              </div>
            </div>

          </div><!-- /container -->
        </div><!-- /product-page -->
      `;

      /* ── Thumbnail interaction ── */
      const mainImg = document.getElementById('main-img');
      const thumbs = document.querySelectorAll('.product-thumb');
      thumbs.forEach(thumb => {
        function activateThumb() {
          const idx = parseInt(thumb.dataset.idx, 10);
          activeThumb = idx;
          thumbs.forEach(t => t.classList.toggle('active', parseInt(t.dataset.idx, 10) === idx));
          if (mainImg && thumb.dataset.src) mainImg.src = thumb.dataset.src;
        }
        thumb.addEventListener('click', activateThumb);
        thumb.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); activateThumb(); } });
      });

      /* ── Variant selector ── */
      function selectVariant(idx) {
        if (!VARIANTS) return;
        activeVariant = idx;
        VARIANTS.forEach((v, i) => {
          const btn = document.getElementById('var-btn-' + i);
          if (!btn) return;
          const active = i === idx;
          btn.style.border = '2px solid ' + (active ? 'var(--green-dark)' : 'var(--border)');
          btn.style.background = active ? 'var(--green-light)' : '#fff';
          btn.style.color = active ? 'var(--green-dark)' : 'var(--text-dark)';
        });
        const v = VARIANTS[idx];
        const pmain = document.getElementById('price-main');
        const pmrp = document.getElementById('price-mrp');
        const badge = document.getElementById('save-badge');
        if (pmain) pmain.textContent = NM.fmt(v.price);
        if (pmrp) { pmrp.textContent = NM.fmt(v.mrp); pmrp.style.display = ''; }
        if (badge) badge.textContent = 'Save ' + NM.fmt(v.mrp - v.price);
        updateLineTotal();
      }
      window.selectVariant = selectVariant;

      /* ── Quantity stepper ── */
      const qtyInput = document.getElementById('qty-input');
      const qtyDec = document.getElementById('qty-dec');
      const qtyInc = document.getElementById('qty-inc');

      function updateLineTotal() {
        const qty = parseInt(qtyInput.value, 10) || 1;
        const linePrice = getEffectivePrice() * qty;
        const lt = document.getElementById('line-total');
        if (lt) lt.textContent = NM.fmt(linePrice);
      }

      function updateQtyButtons() {
        const v = parseInt(qtyInput.value, 10) || 1;
        qtyDec.disabled = v <= 1;
        updateLineTotal();
      }

      qtyDec.addEventListener('click', () => {
        const v = parseInt(qtyInput.value, 10) || 1;
        if (v > 1) { qtyInput.value = v - 1; updateQtyButtons(); }
      });
      qtyInc.addEventListener('click', () => {
        const v = parseInt(qtyInput.value, 10) || 1;
        qtyInput.value = v + 1;
        updateQtyButtons();
      });
      qtyInput.addEventListener('input', () => {
        let v = parseInt(qtyInput.value, 10);
        if (isNaN(v) || v < 1) v = 1;
        qtyInput.value = v;
        updateQtyButtons();
      });
      updateQtyButtons();

      /* ── Add to Cart ── */
      const btnCart = document.getElementById('btn-add-cart');
      if (btnCart && product.inStock) {
        btnCart.addEventListener('click', () => {
          const qty = parseInt(qtyInput.value, 10) || 1;
          const cartItem = {
            id: product.id,
            name: VARIANTS ? `${product.name} (${VARIANTS[activeVariant].label})` : product.name,
            price: getEffectivePrice(),
            img: product.img
          };
          NM.addToCart(cartItem, qty);
          showToast(`${product.name} added to cart (×${qty})`, 'success');
          btnCart.textContent = '✓ Added!';
          setTimeout(() => {
            updateLineTotal();
            const lt = document.getElementById('line-total');
            btnCart.innerHTML = `🛒 Add to Cart · <span id="line-total">${lt ? lt.textContent : NM.fmt(getEffectivePrice())}</span>`;
          }, 1400);
        });
      }

      /* ── Wishlist ── */
      const btnWl = document.getElementById('btn-wishlist');
      const wlLabel = document.getElementById('wl-label');
      const wlHeart = document.getElementById('wl-heart');

      function updateWlBtn() {
        const inWl = NM.inWishlist(product.id);
        btnWl.classList.toggle('wishlisted', inWl);
        wlLabel.textContent = inWl ? 'Remove from Wishlist' : 'Add to Wishlist';
        wlHeart.setAttribute('fill', inWl ? '#ef4444' : 'none');
        wlHeart.setAttribute('stroke', inWl ? '#ef4444' : 'currentColor');
      }
      updateWlBtn();

      btnWl.addEventListener('click', () => {
        const added = NM.toggleWishlist(product.id);
        updateWlBtn();
        showToast(added ? 'Added to wishlist' : 'Removed from wishlist', added ? 'success' : 'info');
      });

      /* ── Tabs ── */
      const tabBtns = document.querySelectorAll('.product-tab-btn');
      const tabPanels = document.querySelectorAll('.product-tab-panel');
      tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          const target = btn.dataset.tab;
          tabBtns.forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected', 'false'); });
          tabPanels.forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          btn.setAttribute('aria-selected', 'true');
          const panel = document.getElementById('tab-' + target);
          if (panel) panel.classList.add('active');
        });
      });

      /* ── Render related products ── */
      const relContainer = document.getElementById('related-products');
      if (relContainer) {
        relContainer.innerHTML = related.map(p => {
          const sp = p.sale || p.price;
          const mp = p.sale ? p.price : null;
          const d = mp ? Math.round((mp - sp) / mp * 100) : 0;
          return `
            <div class="product-card" style="cursor:pointer" onclick="window.location.href='/product?id=${p.id}'">
              <div class="product-card-img" style="overflow:hidden;background:#f5f5f5">
                ${d > 0 ? `<span class="discount-badge">-${d}%</span>` : ''}
                <img src="${p.img}" alt="${p.name}" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block;">
              </div>
              <div class="product-card-body">
                <div class="product-card-brand">${p.brand}</div>
                <div class="product-card-name">${p.name}</div>
                <div class="product-card-price">
                  ${NM.fmt(sp)}
                  ${mp ? `<span class="original">${NM.fmt(mp)}</span>` : ''}
                </div>
                <div class="product-card-actions" style="margin-top:10px">
                  <button class="btn btn-primary btn-sm" style="flex:1;justify-content:center"
                    onclick="event.stopPropagation(); NM.addToCart({id:${p.id},name:'${p.name.replace(/'/g,"\\'")}',price:${sp},img:'${p.img}'},1); showToast('Added to cart','success')">
                    + Cart
                  </button>
                  <button class="wishlist-btn ${NM.inWishlist(p.id) ? 'active' : ''}"
                    onclick="event.stopPropagation(); NM.toggleWishlist(${p.id}); this.classList.toggle('active')">
                    ♡
                  </button>
                </div>
              </div>
            </div>`;
        }).join('');
      }

    })();
  </script>
</body>
</html>
